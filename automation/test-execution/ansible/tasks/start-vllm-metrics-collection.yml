---
# Common task file for starting vLLM server metrics collection
# Used by both LLM and audio benchmark playbooks
#
# Required variables:
#   - vllm_mode: "managed" or "external"
#   - results_path: where to save vllm-metrics.json
#   - test_run_id: unique test identifier
#
# Optional variables:
#   - skip_metrics_collection: set to true to disable (default: false)
#   - vllm_endpoint.external.url: URL for external mode
#   - bench_config.vllm_host: vLLM host for managed mode
#   - bench_config.vllm_port: vLLM port for managed mode

- name: Save vLLM endpoint URL for metrics collection (managed mode)
  ansible.builtin.set_fact:
    vllm_metrics_url: "http://{{ bench_config.vllm_host }}:{{ bench_config.vllm_port }}"
  delegate_to: localhost
  delegate_facts: true
  when:
    - vllm_mode == 'managed'
    - not (skip_metrics_collection | default(false) | bool)

- name: Check if external endpoint exposes metrics
  ansible.builtin.uri:
    url: "{{ vllm_endpoint.external.url }}/metrics"
    method: GET
    status_code: 200
    validate_certs: false
  register: external_metrics_check
  failed_when: false
  delegate_to: localhost
  when:
    - vllm_mode == 'external'
    - not (skip_metrics_collection | default(false) | bool)

- name: Save vLLM endpoint URL for metrics collection (external mode)
  ansible.builtin.set_fact:
    vllm_metrics_url: "{{ vllm_endpoint.external.url }}"
  delegate_to: localhost
  delegate_facts: true
  when:
    - vllm_mode == 'external'
    - external_metrics_check.status | default(0) == 200
    - not (skip_metrics_collection | default(false) | bool)

- name: Display metrics collection info (external mode)
  ansible.builtin.debug:
    msg:
      - "{{ '✅ External endpoint exposes /metrics - server metrics collection ENABLED' if (external_metrics_check.status | default(0) == 200) else '⚠️  External endpoint does not expose /metrics - server metrics collection DISABLED' }}"
      - "{{ 'Metrics URL: ' + vllm_endpoint.external.url + '/metrics' if (external_metrics_check.status | default(0) == 200) else 'Client-side metrics (GuideLLM) will still be collected' }}"
  when:
    - vllm_mode == 'external'
    - not (skip_metrics_collection | default(false) | bool)

- name: Start vLLM metrics collection
  when:
    - hostvars['localhost']['vllm_metrics_url'] is defined
    - not (skip_metrics_collection | default(false) | bool)
  block:
    - name: Start metrics collector in background
      ansible.builtin.include_role:
        name: vllm_metrics_collector
      vars:
        vllm_url: "{{ hostvars['localhost']['vllm_metrics_url'] }}"
        # results_path is already passed to this task file, don't redefine it
        # test_run_id is already passed to this task file, don't redefine it
        metrics_collection_interval: 10
        metrics_collection_duration: 7200  # 2 hours max
        enable_vllm_metrics_collection: true
  delegate_to: localhost
  become: false
