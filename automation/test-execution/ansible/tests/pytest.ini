[pytest]
# Pytest configuration for vLLM CPU performance evaluation tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: Quick smoke tests that validate configuration and syntax (fast, no infrastructure needed)
    integration: Integration tests that may require containers or external services (slower)
    slow: Tests that take significant time to run (image pulls, container starts)
    unit: Unit tests for individual components

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Test paths
testpaths = .

# Ignore paths
norecursedirs = .git .pytest_cache __pycache__ venv .venv

# Warnings
filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
