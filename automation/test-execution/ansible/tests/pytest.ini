[pytest]
# Pytest configuration for vLLM CPU performance evaluation tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: Quick smoke tests that validate configuration and syntax (fast, no infrastructure needed)
    unit: Unit tests for individual components
    integration: Integration tests requiring containers or infrastructure (2+ components)
    e2e: End-to-end workflow tests (full user scenarios, subset of integration)
    slow: Tests that take significant time to run (> 1 minute)
    requires_numa: Tests requiring multi-NUMA hardware
    requires_container: Tests requiring podman or docker

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Test paths
testpaths = .

# Ignore paths
norecursedirs = .git .pytest_cache __pycache__ venv .venv

# Warnings
filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
