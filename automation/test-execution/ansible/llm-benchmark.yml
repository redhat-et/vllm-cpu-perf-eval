---
# Run Single GuideLLM Test for LLM Generative Models
# Tests one model with one core configuration and one workload

- name: "LLM GuideLLM Test - Setup"
  hosts: localhost
  gather_facts: false
  vars:
    test_run_id: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - test_model is defined
          - workload_type is defined
          - core_config_name is defined
        fail_msg: |
          Missing required variables. Please provide:
          -e "test_model=<model>"
          -e "workload_type=<summarization|chat|code|rag>"
          -e "core_config_name=<config_name>"

    - name: Get core configuration by name
      ansible.builtin.set_fact:
        core_configuration: "{{ core_configs | selectattr('name', 'equalto', core_config_name) | first }}"
      failed_when: core_configuration is not defined

    - name: Display test information
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "LLM GuideLLM Performance Test"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Test Run ID: {{ test_run_id }}"
          - "Model: {{ test_model }}"
          - "Workload: {{ workload_type }}"
          - "Core Config: {{ core_config_name }} ({{ core_configuration.cores }} cores, TP={{ core_configuration.tensor_parallel }})"
          - "DUT: {{ groups['dut'][0] }} ({{ hostvars[groups['dut'][0]]['ansible_host'] }})"
          - "Load Generator: {{ groups['load_generator'][0] }} ({{ hostvars[groups['load_generator'][0]]['ansible_host'] }})"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# ==============================================================================
# PHASE 1: Start vLLM Server on DUT
# ==============================================================================

- name: "Phase 1 - Start vLLM Server on DUT"
  hosts: dut
  become: true
  vars:
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"

  roles:
    - role: vllm_server

# ==============================================================================
# PHASE 2: Health Check - Wait for vLLM
# ==============================================================================

- name: "Phase 2 - Wait for vLLM Server to be Ready"
  ansible.builtin.import_playbook: health-check.yml

# ==============================================================================
# PHASE 3: Run GuideLLM Benchmark
# ==============================================================================

- name: "Phase 3 - Run GuideLLM Benchmark"
  hosts: load_generator
  become: true
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"

  roles:
    - role: hf_token
      tasks_from: setup-optional
    - role: benchmark_guidellm

# ==============================================================================
# PHASE 4: Collect Results and Logs
# ==============================================================================

- name: "Phase 4 - Fetch Test Results"
  hosts: load_generator
  gather_facts: false
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"

  tasks:
    - name: Tag results with metadata
      ansible.builtin.copy:
        content: |
          {
            "test_run_id": "{{ test_run_id }}",
            "config_type": "manual",
            "core_config_name": "{{ core_configuration.name }}",
            "core_count": {{ core_configuration.cores }},
            "cpuset_cpus": "{{ core_configuration.cpuset_cpus }}",
            "cpuset_mems": "{{ core_configuration.cpuset_mems }}",
            "tensor_parallel": {{ core_configuration.tensor_parallel }},
            "omp_num_threads": {{ core_configuration.omp_num_threads | default('null') }},
            "omp_threads_bind": {{ core_configuration.omp_threads_bind | default('null') }},
            "model": "{{ test_model }}",
            "workload": "{{ workload_type }}",
            "timestamp": "{{ lookup('pipe', 'date -Iseconds') }}",
            "test_duration": "{{ test_duration_string | default('unknown') }}",
            "test_duration_seconds": {{ test_duration_seconds | default('null') }}
          }
        dest: "{{ bench_config.results_dir }}/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/test-metadata.json"

    - name: Ensure local results directory exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Fetch results to local machine
      ansible.posix.synchronize:
        src: "{{ bench_config.results_dir }}/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/"
        dest: "{{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/"
        mode: pull
        recursive: true

    - name: Copy GuideLLM log from controller to final results
      ansible.builtin.copy:
        src: "{{ bench_config.results_dir }}/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/guidellm.log"
        dest: "{{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/guidellm.log"
      delegate_to: localhost
      failed_when: false

    - name: Extract per-benchmark timings from benchmarks.json
      ansible.builtin.command:
        cmd: >-
          python3 {{ playbook_dir }}/scripts/extract_benchmark_timings.py
          {{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/benchmarks.json
          {{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/test-metadata.json
      delegate_to: localhost
      register: timing_extraction
      changed_when: false
      failed_when: false

    - name: Display timing extraction result
      ansible.builtin.debug:
        msg: "{{ timing_extraction.stdout_lines }}"
      when: timing_extraction.stdout_lines is defined

- name: "Phase 4 - Collect Logs from DUT"
  hosts: dut
  become: true
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"

  roles:
    - role: results_collector
      vars:
        log_collection_dest: "{{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/"
        journald_identifier: "vllm-{{ workload_type }}-{{ core_configuration.cores }}c-tp{{ core_configuration.tensor_parallel }}"
        log_filename_prefix: "vllm-server"
        journald_time_range: "1 hour ago"

# ==============================================================================
# PHASE 5: Cleanup (Optional)
# ==============================================================================

- name: "Phase 5 - Cleanup (if requested)"
  hosts: dut
  become: true
  vars:
    cleanup: "{{ cleanup_after_test | default(false) }}"

  tasks:
    - name: Stop vLLM container
      containers.podman.podman_container:
        name: "{{ vllm_container_name }}"
        state: stopped
      when:
        - cleanup | bool
        - vllm_server.container_runtime == 'podman'

    - name: Display cleanup status
      ansible.builtin.debug:
        msg: "vLLM server {{ 'stopped' if cleanup else 'still running - use cleanup_after_test=true to stop' }}"

# ==============================================================================
# SUMMARY
# ==============================================================================

- name: "Test Summary"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Display test summary
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✓ LLM GuideLLM Test Complete!"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Model: {{ test_model }}"
          - "Workload: {{ workload_type }}"
          - "Core Config: {{ core_config_name }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Results: results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
