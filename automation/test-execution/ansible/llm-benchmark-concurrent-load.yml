---
# ============================================================================
# Concurrent Load Testing - 3-Phase Benchmark Suite
# ============================================================================
# Orchestrates all phases of concurrent load testing for a workload.
# Runs baseline, realistic, and production configurations in sequence.
#
# Usage:
#   ansible-playbook llm-benchmark-concurrent-load.yml \
#     -e "test_model=TinyLlama/TinyLlama-1.1B-Chat-v1.0" \
#     -e "base_workload=chat" \
#     -e "core_sweep_counts=[16,32]"
#
# Optional Parameters:
#   skip_phase_1: true  # Skip baseline phase (default: false)
#   skip_phase_2: true  # Skip realistic phase (default: false)
#   skip_phase_3: true  # Skip production phase (default: false)
#   requested_cores: 16 # Single core count instead of sweep
#
# Workload Types:
#   Any workload defined in inventory/group_vars/all/test-workloads.yml
#   Examples: chat, rag, code, summarization, reasoning
#   Add custom workloads by editing test-workloads.yml
#
# Example - Full 3-phase test:
#   ansible-playbook llm-benchmark-concurrent-load.yml \
#     -e "test_model=meta-llama/Llama-3.2-1B-Instruct" \
#     -e "base_workload=chat" \
#     -e "core_sweep_counts=[16,32,64]"
#
# Example - Baseline only:
#   ansible-playbook llm-benchmark-concurrent-load.yml \
#     -e "test_model=TinyLlama/TinyLlama-1.1B-Chat-v1.0" \
#     -e "base_workload=chat" \
#     -e "requested_cores=16" \
#     -e "skip_phase_2=true" \
#     -e "skip_phase_3=true"
#
# Socket Pinning (optional):
#   # Pin vLLM to socket 1 (cores 64-95, NUMA node 1)
#   # Pin GuideLLM to socket 0 (cores 0-31, NUMA node 0)
#   ansible-playbook llm-benchmark-concurrent-load.yml \
#     -e "test_model=meta-llama/Llama-3.2-1B-Instruct" \
#     -e "base_workload=chat" \
#     -e "requested_cores=32" \
#     -e "vllm_cpu_start=64" \
#     -e "vllm_numa_node=1" \
#     -e "guidellm_cpus=0-31" \
#     -e "guidellm_numa_node=0"
#
# ============================================================================

- name: Concurrent Load Testing - Configuration
  hosts: localhost
  gather_facts: false

  vars:
    # Determine variable workload suffix
    variable_workload: "{{ base_workload }}_var"

  tasks:
    - name: Detect if running from AWX
      ansible.builtin.set_fact:
        is_awx_job: "{{ lookup('env', 'AWX_JOB_ID') | length > 0 }}"

    - name: Set vLLM mode
      ansible.builtin.set_fact:
        vllm_mode: "{{ vllm_endpoint.mode | default('managed') }}"

    - name: Validate base_workload parameter
      ansible.builtin.assert:
        that:
          - base_workload is defined
          - base_workload in test_configs.keys()
        fail_msg: |
          Unsupported base_workload: {{ base_workload }}
          Supported workloads: {{ test_configs.keys() | list | join(', ') }}

    - name: Validate required parameters (managed mode only)
      ansible.builtin.assert:
        that:
          - >-
            (requested_cores | default(0) | int > 0) or
            (core_sweep_counts is defined and core_sweep_counts is not none and core_sweep_counts | length > 0)
        fail_msg: |
          Missing required parameter: requested_cores or core_sweep_counts
          Please provide either:
            - Single core count: -e "requested_cores=<8|16|32|64|...>"
            - Single-element list: -e "core_sweep_counts=[16]"

          Note: This playbook supports only a single core configuration.
          For testing multiple core counts, use llm-core-sweep-auto.yml instead.
      when: vllm_mode == 'managed'

    - name: Warn if cores specified in external mode
      ansible.builtin.debug:
        msg:
          - "⚠️  Warning: requested_cores={{ requested_cores }} specified but not used in external mode"
          - "   External endpoints have their own CPU allocation - core count will be ignored"
          - "   Core count will be set to 0 for metadata purposes"
      when:
        - vllm_mode == 'external'
        - requested_cores is defined

    - name: Override core count to 0 for external mode
      ansible.builtin.set_fact:
        requested_cores: 0
      when:
        - vllm_mode == 'external'

    - name: Validate vllm_cpu_start if provided
      ansible.builtin.assert:
        that:
          - vllm_cpu_start | int >= 0
        fail_msg: "vllm_cpu_start must be a non-negative integer, got: {{ vllm_cpu_start }}"
      when: vllm_cpu_start is defined

    - name: Validate vllm_numa_node if provided
      ansible.builtin.assert:
        that:
          - vllm_numa_node | int >= 0
        fail_msg: "vllm_numa_node must be a non-negative integer, got: {{ vllm_numa_node }}"
      when: vllm_numa_node is defined

    - name: Validate guidellm_numa_node if provided
      ansible.builtin.assert:
        that:
          - guidellm_numa_node | int >= 0
        fail_msg: "guidellm_numa_node must be a non-negative integer, got: {{ guidellm_numa_node }}"
      when: guidellm_numa_node is defined

    - name: Normalize core configuration input
      ansible.builtin.set_fact:
        effective_requested_cores: "{{ 0 if vllm_mode == 'external' else (requested_cores if (requested_cores is defined and requested_cores | int > 0) else (core_sweep_counts | first if (core_sweep_counts is defined and core_sweep_counts | length > 0) else 0)) }}"

    - name: Validate single core configuration for concurrent load testing
      ansible.builtin.assert:
        that:
          - not (core_sweep_counts is defined and core_sweep_counts | length > 1)
        fail_msg: |
          Multiple core counts not supported in concurrent load testing.
          For testing multiple core configurations, use llm-core-sweep-auto.yml with concurrent load parameters.

          Example:
            ansible-playbook llm-core-sweep-auto.yml \
              -e "requested_cores_list=[16,32,64]" \
              -e "test_model=<YOUR_MODEL>" \
              -e "workload_type=<WORKLOAD_TYPE>"

    - name: Validate test_model in managed mode
      ansible.builtin.assert:
        that:
          - test_model is defined
        fail_msg: "test_model is required in managed mode"
      when: vllm_mode == 'managed'

    - name: Display mode info
      ansible.builtin.debug:
        msg: "{{ 'External mode: test_model will be detected from endpoint' if vllm_mode == 'external' and test_model is not defined else 'Using specified test_model: ' + test_model }}"
      when: vllm_mode == 'external' or test_model is defined

    - name: Check if variable workload exists
      ansible.builtin.set_fact:
        has_variable_workload: "{{ variable_workload in ['chat_var', 'code_var','summarization_var'] }}"

    # Set test_model passthrough for downstream playbooks
    # '__AUTO_DETECT__' is a sentinel value that tells llm-benchmark-auto.yml
    # to auto-detect the model from the external endpoint's /v1/models API
    # (see llm-benchmark-auto.yml external endpoint model detection block)
    - name: Set passthrough test_model variable
      ansible.builtin.set_fact:
        passthrough_test_model: "{{ test_model | default('__AUTO_DETECT__') }}"

    # Set passthrough variables for socket pinning parameters to avoid recursive template references
    - name: Set passthrough vllm_cpu_start if defined
      ansible.builtin.set_fact:
        passthrough_vllm_cpu_start: "{{ vllm_cpu_start }}"
      when: vllm_cpu_start is defined

    - name: Set passthrough vllm_numa_node if defined
      ansible.builtin.set_fact:
        passthrough_vllm_numa_node: "{{ vllm_numa_node }}"
      when: vllm_numa_node is defined

    - name: Set passthrough guidellm_cpus if defined
      ansible.builtin.set_fact:
        passthrough_guidellm_cpus: "{{ guidellm_cpus }}"
      when: guidellm_cpus is defined

    - name: Set passthrough guidellm_numa_node if defined
      ansible.builtin.set_fact:
        passthrough_guidellm_numa_node: "{{ guidellm_numa_node }}"
      when: guidellm_numa_node is defined

    - name: Display test suite configuration
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "Concurrent Load Testing - 3-Phase Suite"
          - "============================================================"
          - "Model: {{ test_model | default('auto-detect from endpoint') }}"
          - "Base Workload: {{ base_workload }}"
          - "vLLM Mode: {{ vllm_mode }}"
          - "Phase 1 (Baseline - Fixed, No Cache): {{ 'SKIP' if (skip_phase_1 | default(false) | bool) else 'RUN' }}"
          - "Phase 2 (Realistic - Variable, No Cache): {{ 'SKIP' if (skip_phase_2 | default(false) | bool) else ('RUN' if has_variable_workload else 'N/A') }}"
          - "Phase 3 (Production - Variable, With Cache): {{ 'SKIP' if (skip_phase_3 | default(false) | bool) else ('RUN' if has_variable_workload else 'N/A') }}"
          - "Core Configuration: {{ '0 cores (external endpoint manages its own CPUs)' if vllm_mode == 'external' else (effective_requested_cores | string) + ' cores' }}"
          - "============================================================"

# ==========================================================================
# Phase 1: Baseline (Fixed Tokens, No Caching)
# ==========================================================================
- name: "Phase 1: Baseline Testing (Fixed Tokens, No Caching)"
  ansible.builtin.import_playbook: llm-benchmark-auto.yml
  vars:
    test_model: "{{ hostvars['localhost']['passthrough_test_model'] }}"
    workload_type: "{{ base_workload }}"
    vllm_caching_mode: "baseline"
    requested_cores: "{{ effective_requested_cores }}"
    vllm_cpu_start: "{{ hostvars['localhost']['passthrough_vllm_cpu_start'] | default(None) }}"
    vllm_numa_node: "{{ hostvars['localhost']['passthrough_vllm_numa_node'] | default(None) }}"
    guidellm_cpus: "{{ hostvars['localhost']['passthrough_guidellm_cpus'] | default(None) }}"
    guidellm_numa_node: "{{ hostvars['localhost']['passthrough_guidellm_numa_node'] | default(None) }}"
  when: not (skip_phase_1 | default(false) | bool)

- name: Phase 1 Complete
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Phase 1 complete notification
      ansible.builtin.debug:
        msg:
          - "✓ Phase 1 Complete: Baseline ({{ base_workload }})"
          - "  Workload: {{ base_workload }} (fixed tokens)"
          - "  Caching: disabled (--no-enable-prefix-caching)"
      when: not (skip_phase_1 | default(false) | bool)

# ==========================================================================
# Phase 2: Realistic (Variable Tokens, No Caching)
# ==========================================================================
- name: "Phase 2: Realistic Testing (Variable Tokens, No Caching)"
  ansible.builtin.import_playbook: llm-benchmark-auto.yml
  vars:
    test_model: "{{ hostvars['localhost']['passthrough_test_model'] }}"
    workload_type: "{{ base_workload }}_var"
    vllm_caching_mode: "baseline"
    requested_cores: "{{ effective_requested_cores }}"
    vllm_cpu_start: "{{ hostvars['localhost']['passthrough_vllm_cpu_start'] | default(None) }}"
    vllm_numa_node: "{{ hostvars['localhost']['passthrough_vllm_numa_node'] | default(None) }}"
    guidellm_cpus: "{{ hostvars['localhost']['passthrough_guidellm_cpus'] | default(None) }}"
    guidellm_numa_node: "{{ hostvars['localhost']['passthrough_guidellm_numa_node'] | default(None) }}"
  when:
    - not (skip_phase_2 | default(false) | bool)
    - (base_workload + '_var') in ['chat_var', 'code_var', 'summarization_var']

- name: Phase 2 Complete
  hosts: localhost
  gather_facts: false
  vars:
    has_variable_workload: "{{ (base_workload + '_var') in ['chat_var', 'code_var','summarization_var' ] }}"
  tasks:
    - name: Phase 2 skipped notification
      ansible.builtin.debug:
        msg:
          - "⊘ Phase 2 Skipped: No variable workload defined for {{ base_workload }}"
          - "  Variable workloads only available for: chat, code, summarization"
      when:
        - not (skip_phase_2 | default(false) | bool)
        - not has_variable_workload

    - name: Phase 2 complete notification
      ansible.builtin.debug:
        msg:
          - "✓ Phase 2 Complete: Realistic ({{ base_workload }}_var)"
          - "  Workload: {{ base_workload }}_var (variable tokens)"
          - "  Caching: disabled (--no-enable-prefix-caching)"
      when:
        - not (skip_phase_2 | default(false) | bool)
        - has_variable_workload

# ==========================================================================
# Phase 3: Production (Variable Tokens, With Caching)
# ==========================================================================
- name: "Phase 3: Production Testing (Variable Tokens, With Caching)"
  ansible.builtin.import_playbook: llm-benchmark-auto.yml
  vars:
    test_model: "{{ hostvars['localhost']['passthrough_test_model'] }}"
    workload_type: "{{ base_workload }}_var"
    vllm_caching_mode: "production"
    requested_cores: "{{ effective_requested_cores }}"
    vllm_cpu_start: "{{ hostvars['localhost']['passthrough_vllm_cpu_start'] | default(None) }}"
    vllm_numa_node: "{{ hostvars['localhost']['passthrough_vllm_numa_node'] | default(None) }}"
    guidellm_cpus: "{{ hostvars['localhost']['passthrough_guidellm_cpus'] | default(None) }}"
    guidellm_numa_node: "{{ hostvars['localhost']['passthrough_guidellm_numa_node'] | default(None) }}"
  when:
    - not (skip_phase_3 | default(false) | bool)
    - (base_workload + '_var') in ['chat_var', 'code_var', 'summarization_var']

- name: Phase 3 Complete
  hosts: localhost
  gather_facts: false
  vars:
    has_variable_workload: "{{ (base_workload + '_var') in ['chat_var', 'code_var','summarization_var'] }}"
  tasks:
    - name: Phase 3 skipped notification
      ansible.builtin.debug:
        msg:
          - "⊘ Phase 3 Skipped: No variable workload defined for {{ base_workload }}"
          - "  Production testing (Phase 3) requires variable workload"
          - "  Variable workloads only available for: chat, code, summarization"
      when:
        - not (skip_phase_3 | default(false) | bool)
        - not has_variable_workload

    - name: Phase 3 complete notification
      ansible.builtin.debug:
        msg:
          - "✓ Phase 3 Complete: Production ({{ base_workload }}_var)"
          - "  Workload: {{ base_workload }}_var (variable tokens)"
          - "  Caching: enabled (prefix caching + radix cache)"
      when:
        - not (skip_phase_3 | default(false) | bool)
        - has_variable_workload

# ==========================================================================
# Test Suite Summary
# ==========================================================================
- name: Test Suite Summary
  hosts: localhost
  gather_facts: false
  vars:
    has_variable_workload: "{{ (base_workload + '_var') in ['chat_var', 'code_var','summarization_var'] }}"
  tasks:
    - name: Display test suite summary
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "Concurrent Load Testing - COMPLETE"
          - "============================================================"
          - "Model: {{ test_model | default('auto-detected from endpoint') }}"
          - "Base Workload: {{ base_workload }}"
          - ""
          - "Phases Completed:"
          - "  Phase 1 (Baseline - Fixed, No Cache): {{ 'SKIPPED' if (skip_phase_1 | default(false) | bool) else 'COMPLETE' }}"
          - "  Phase 2 (Realistic - Variable, No Cache): {{ 'SKIPPED' if (skip_phase_2 | default(false) | bool) else ('COMPLETE' if has_variable_workload else 'N/A') }}"
          - "  Phase 3 (Production - Variable, With Cache): {{ 'SKIPPED' if (skip_phase_3 | default(false) | bool) else ('COMPLETE' if has_variable_workload else 'N/A') }}"
          - ""
          - "Results Location:"
          - "  {{ '~/benchmark-results' if is_awx_job else 'results/llm' }}/{{ (test_model | default('unknown-model')) | replace('/', '__') }}/"
          - "============================================================"
