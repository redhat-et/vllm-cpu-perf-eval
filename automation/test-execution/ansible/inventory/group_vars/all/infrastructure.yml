---
# ============================================================================
# Infrastructure Configuration
# ============================================================================
# Platform setup, container runtime, and health check settings
# These affect all test runs regardless of model or workload type

# SSH configuration
ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"

# Platform setup options
platform_setup:
  numa_balancing_off: true        # Recommended for benchmarks
  thp_defrag_never: true          # Recommended for determinism
  preempt_full: false             # NOT recommended for ML workloads (DUT)
  # For load generator: set to true for better latency
  # Override per host group if needed

# Container runtime settings
container_runtime:
  engine: "podman"
  # ⚠️ CHANGE: Update to official vLLM image or your preferred version
  # This image includes CPU optimizations for performance testing
  # Can be overridden with environment variable: export VLLM_CONTAINER_IMAGE=...
  image: "{{ lookup('env', 'VLLM_CONTAINER_IMAGE') | default('docker.io/vllm/vllm-openai-cpu:v0.19.0', true) }}"
  security_opts:
    - "seccomp=unconfined"
  capabilities:
    - "SYS_NICE"
  network_mode: "host"
  shm_size: "4g"

# Health check configuration
health_check:
  timeout: 300                  # Total timeout in seconds
  interval: 5                   # Check interval in seconds

# Test execution options
skip_phase_3: true              # Phase 3 not implemented yet
