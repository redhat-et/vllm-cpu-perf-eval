---
# ============================================================================
# Benchmark Tool Configuration
# ============================================================================
# Settings for GuideLLM and vllm bench serve

benchmark_tool:
  # ============================================================================
  # GuideLLM Configuration
  # ============================================================================
  guidellm:
    # Execution mode: containerized or host-based
    # - containerized (default): Run in Podman container (isolated, reproducible)
    # - host: Run guidellm from PATH (requires: pip install guidellm)
    # Can be overridden with environment variable: export GUIDELLM_USE_CONTAINER=false
    use_container: "{{ (lookup('env', 'GUIDELLM_USE_CONTAINER') | default('true', true) | lower) in ['true', '1', 'yes'] }}"

    # Using GuideLLM official container image
    # Can be overridden with environment variable: export GUIDELLM_CONTAINER_IMAGE=...
    container_image: "{{ lookup('env', 'GUIDELLM_CONTAINER_IMAGE') | default('ghcr.io/vllm-project/guidellm:v0.6.0', true) }}"

    # CPU allocation (only applies to containerized mode)
    # Load generator CPU allocation
    cpuset_cpus: "16-31"
    cpuset_mems: "0"

    # ========================================================================
    # Benchmark Profile Configuration
    # ========================================================================
    # Profile types and their required parameters:
    #
    # 1. synchronous: Single request at a time (baseline metrics)
    #    - No rate parameter needed
    #    - Best for: Quick baseline measurements
    #
    # 2. throughput: Find maximum throughput
    #    - rate: [max_concurrency] (single value, e.g., [32])
    #    - Best for: Finding saturation point
    #
    # 3. concurrent: Fixed concurrency levels
    #    - rate: [stream1, stream2, ...] (e.g., [8, 16, 32])
    #    - Best for: Testing specific concurrency levels
    #
    # 4. sweep: Adaptive multi-strategy (sync + throughput + interpolated rates)
    #    - rate: [num_benchmarks] (optional, default: 10)
    #    - Best for: Comprehensive performance analysis
    #
    # 5. constant/poisson: Rate-based scheduling
    #    - rate: [req_per_sec1, req_per_sec2, ...] (e.g., [10, 20, 30])
    #    - Best for: Testing specific request rates
    # ========================================================================

    # Default profile matching benchmark guide methodology
    profile: "concurrent"

    # Rate parameter (meaning depends on profile - see above)
    # For throughput: max concurrent requests to test
    # For concurrent: list of concurrent stream counts [8, 16, 32]
    # For constant/poisson: list of requests per second [10, 20, 30]
    # For sweep: number of benchmarks to generate (optional)
    # For synchronous: leave empty (will error if provided)
    # Default concurrency sweep for CPU testing: [1, 2, 4, 8, 16, 32]
    rate: [1, 2, 4, 8, 16, 32]

    # Runtime constraints (apply to all profiles)
    max_seconds: 600            # Maximum benchmark duration (10 minutes for enhanced methodology)
    max_requests: 1000          # Maximum number of requests (fallback if max_seconds not reached)
    request_timeout: 600        # Request timeout (matches max_seconds for CPU testing)
    warmup: 0.1                 # Warmup as percentage (10% of time for time-based tests)
    max_concurrency: 128        # Max concurrent requests (CPU testing)
    saturation_threshold: 0.98  # Saturation detection threshold (0-1)
    cooldown: 30                # Cooldown period between tests (seconds)

    # Safety timeout for podman wait (prevents indefinite hangs)
    # For concurrent/constant/poisson profiles:
    #   Calculated as: min(num_rates * (max_seconds + 70) + 300, 14400)
    #   Example: 6 rates * (600s + 70s overhead) + 300s buffer = 4320s (~72 min)
    # For other profiles:
    #   Calculated as: min(max_seconds + 600, 14400)
    # Override with: -e "guidellm_wait_timeout_seconds=7200" for custom timeout

    # Output configuration
    outputs: "json,csv"    # Output formats (comma-separated) - HTML disabled due to vllm.ai URL redirect issue
    exclude_throughput_target: false
    exclude_throughput_result: false

  # ============================================================================
  # vllm bench serve Configuration
  # ============================================================================
  vllm_bench:
    # Execution mode: containerized or host-based
    use_container: true

    # Container image for vllm bench
    # Can be overridden with environment variable: export VLLM_BENCH_CONTAINER_IMAGE=...
    container_image: "{{ lookup('env', 'VLLM_BENCH_CONTAINER_IMAGE') | default('quay.io/mtahhan/vllm:arm-base-cpu', true) }}"

    # Number of prompts for embedding benchmark tests
    # Trade-off: sample size vs test duration
    # - 250 prompts: ~4-5 min/test, good for throughput & P50/P90 latency
    # - 500 prompts: ~9-10 min/test, better P99 stability
    # - 1000 prompts: ~18-20 min/test, production-grade measurements
    num_prompts: 250  # Quick tests

# ============================================================================
# Profile Examples for Different Use Cases
# ============================================================================
#
# Quick baseline test:
#   profile: "synchronous"
#   rate: []
#
# Find max throughput (current config):
#   profile: "throughput"
#   rate: [32]
#
# Test specific concurrency levels:
#   profile: "concurrent"
#   rate: [8, 16, 32]
#
# Comprehensive analysis:
#   profile: "sweep"
#   rate: [10]  # Optional: number of benchmark points
#
# Rate-based testing:
#   profile: "constant"
#   rate: [10, 20, 30]  # Requests per second
#
# ============================================================================
# Concurrent Load Testing Configuration (Enhanced Methodology v2)
# ============================================================================
#
# For concurrent load tests with enhanced methodology:
#   profile: "concurrent"
#   rate: [1, 2, 4, 8, 16, 32]         # Concurrency levels (balanced coverage)
#   max_seconds: 600                   # 10-minute time-based testing
#   warmup: 0.1                        # 10% warmup (60 seconds)
#   request_timeout: 600               # Match max_seconds
#   Total test time: ~72 min (6 rounds * (600s + 70s overhead) + 300s buffer)
#
# Phase 1 - Baseline (Fixed tokens, No caching):
#   vllm_caching_mode: "baseline"
#   workload_type: "chat" | "rag" | "code" | "summarization"
#
# Phase 2 - Realistic (Variable tokens, No caching):
#   vllm_caching_mode: "baseline"
#   workload_type: "chat_var" | "code_var"
#
# Phase 3 - Production (Variable tokens, With caching):
#   vllm_caching_mode: "production"
#   workload_type: "chat_var" | "code_var"
#
# ============================================================================
