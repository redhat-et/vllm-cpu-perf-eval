---
# ============================================================================
# Test Workload Configurations
# ============================================================================
# Predefined test configurations for different workload types
# These are model-agnostic and can be used with any compatible model

test_configs:
  # ============================================================================
  # Embedding Model Testing
  # ============================================================================
  embedding:
    workload_type: "embedding"
    isl: 512
    osl: 1
    backend: "openai-embeddings"
    vllm_args:
      - "--dtype=bfloat16"
      - "--max-model-len=512"
    kv_cache_space: "1GiB"

  # ============================================================================
  # LLM Generative Models - Various Workloads
  # ============================================================================

  # Summarization workload (medium input, short output)
  summarization:
    workload_type: "summarization"
    isl: 1024
    osl: 256
    backend: "openai-completions"
    vllm_args:
      - "--dtype=bfloat16"
      - "--no-enable-prefix-caching"
    kv_cache_space: "40GiB"

  # Chat workload (short input, short output)
  chat:
    workload_type: "chat"
    isl: 512
    osl: 256
    backend: "openai-chat"
    vllm_args:
      - "--dtype=bfloat16"
      - "--no-enable-prefix-caching"
    kv_cache_space: "40GiB"

  # RAG workload (very long input, medium output)
  rag:
    workload_type: "rag"
    isl: 4096
    osl: 512
    backend: "openai-completions"
    vllm_args:
      - "--dtype=bfloat16"
      - "--no-enable-prefix-caching"
    kv_cache_space: "80GiB"

  # Code generation workload (short input, very long output)
  code:
    workload_type: "code"
    isl: 512
    osl: 4096
    backend: "openai-completions"
    vllm_args:
      - "--dtype=bfloat16"
      - "--no-enable-prefix-caching"
    kv_cache_space: "90GiB"

  # Short code generation workload (short input, long output)
  short_codegen:
    workload_type: "short_codegen"
    isl: 256
    osl: 2048
    backend: "openai-completions"
    vllm_args:
      - "--dtype=bfloat16"
      - "--no-enable-prefix-caching"
    kv_cache_space: "50GiB"
