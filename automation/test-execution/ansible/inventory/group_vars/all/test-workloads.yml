---
# ============================================================================
# Test Workload Configurations
# ============================================================================
# Predefined test configurations for different workload types
# These are model-agnostic and can be used with any compatible model
#
# Configuration Parameters:
#   workload_type: Descriptive name for the workload
#   isl: Input Sequence Length (tokens)
#   osl: Output Sequence Length (tokens)
#   variability: Whether to use variable sequence lengths (for realistic traffic)
#   backend: GuideLLM backend type (openai-chat, openai-completions, openai-embeddings)
#   vllm_args: Arguments passed to vLLM server (NOTE: --dtype is model-specific and will be overridden)
#   kv_cache_space: KV cache allocation for this workload (NOTE: will be overridden by model-specific value)
#
# Variable Workload Parameters (when variability: true):
#   isl_stdev: Standard deviation for input length
#   isl_min/isl_max: Input length bounds
#   osl_stdev: Standard deviation for output length
#   osl_min/osl_max: Output length bounds
#
# KV Cache Sizing Guidelines:
#   NOTE: The kv_cache_space values below are FALLBACK values only.
#   Model-specific KV cache sizes are defined in models/llm-models/model-matrix.yaml
#   and will override these values during test execution.
#
#   The kv_cache_space is calculated based on:
#   - Total sequence length (isl + osl)
#   - Expected concurrent requests
#   - Model architecture (hidden_size, num_layers, num_kv_heads)
#   - Data type (bfloat16 = 2 bytes per element)
#   - Safety margin for variable workloads
#
#   Formula: 2 × num_hidden_layers × tokens × num_key_value_heads × head_size × dtype_bytes
#   See kv_cache_calculations.md for detailed per-model calculations.

test_configs:
  # ============================================================================
  # Embedding Model Testing
  # ============================================================================
  embedding:
    workload_type: "embedding"
    isl: 512                      # Input sequence length for embeddings
    osl: 1                        # No generation, single token placeholder
    variability: false
    backend: "openai-embeddings"
    vllm_args:
      - "--dtype=auto"            # Fallback dtype - overridden by model-specific dtype
      - "--max-model-len=512"     # Limit context to input length
    kv_cache_space: "1GiB"        # Minimal cache (no generation)

  # ============================================================================
  # LLM Generative Models - Various Workloads
  # ============================================================================

  # Chat workload (primary working point)
  chat:
    workload_type: "chat"
    isl: 512                            # Standard input: user query
    osl: 512                            # Standard output: assistant response
    variability: false
    backend: "openai-chat"
    vllm_args:
      - "--dtype=auto"                  # Fallback dtype - overridden by model-specific dtype
      - "--no-enable-prefix-caching"    # Baseline mode: no prefix caching
      - "--max-model-len=2048"          # Limit model context to workload needs (1024 tokens)
    kv_cache_space: "40GiB"             # Fallback value - should be overridden by model-specific kv_cache_sizes

  # RAG workload (very long input, medium output)
  rag:
    workload_type: "rag"
    isl: 8192                           # Very long input: retrieved context (ISL-heavy is fine)
    osl: 512                            # Medium output: answer with citations (keep OSL short)
    variability: false
    backend: "openai-completions"
    vllm_args:
      - "--dtype=auto"                  # Fallback dtype - overridden by model-specific dtype
      - "--no-enable-prefix-caching"    # Baseline mode: no prefix caching
      - "--max-model-len=16384"         # Limit model context to workload needs (8704 tokens)
    kv_cache_space: "40GiB"             # Fallback value - should be overridden by model-specific kv_cache_sizes

  # Code generation workload (medium input, practical CPU ceiling output)
  code:
    workload_type: "code"
    isl: 1024                           # Medium input: code prompt/requirements
    osl: 1024                           # Practical output: generated code (1024 OSL near CPU ceiling)
    variability: false
    backend: "openai-completions"
    vllm_args:
      - "--dtype=auto"                  # Fallback dtype - overridden by model-specific dtype
      - "--no-enable-prefix-caching"    # Baseline mode: no prefix caching
      - "--max-model-len=4096"          # Limit model context to workload needs (2048 tokens)
    kv_cache_space: "40GiB"             # Fallback value - should be overridden by model-specific kv_cache_sizes

  # Summarization workload (long input, short output)
  summarization:
    workload_type: "summarization"
    isl: 2048                           # Long input: document to summarize
    osl: 256                            # Short output: summary (realistic and achievable)
    variability: false
    backend: "openai-completions"
    vllm_args:
      - "--dtype=auto"                  # Fallback dtype - overridden by model-specific dtype
      - "--no-enable-prefix-caching"    # Baseline mode: no prefix caching
      - "--max-model-len=4096"          # Limit model context to workload needs (2304 tokens)
    kv_cache_space: "40GiB"             # Fallback value - should be overridden by model-specific kv_cache_sizes

  # Reasoning workload (short input, long output)
  reasoning:
    workload_type: "reasoning"
    isl: 256                            # Short input: reasoning prompt
    osl: 2048                           # Long output: chain-of-thought reasoning
    variability: false
    backend: "openai-completions"
    vllm_args:
      - "--dtype=auto"                  # Fallback dtype - overridden by model-specific dtype
      - "--no-enable-prefix-caching"    # Baseline mode: no prefix caching
      - "--max-model-len=4096"          # Limit model context to workload needs (2304 tokens)
    kv_cache_space: "40GiB"             # Fallback value - should be overridden by model-specific kv_cache_sizes

  # ============================================================================
  # Variable Workloads (Realistic Traffic Simulation)
  # ============================================================================

  # Chat workload with variability (realistic traffic simulation)
  chat_var:
    workload_type: "chat_var"
    isl: 512                            # Mean input length
    isl_stdev: 128                      # Input length std dev (~25% variance)
    isl_min: 128                        # Minimum input (short questions)
    isl_max: 1024                       # Maximum input (detailed queries)
    osl: 512                            # Mean output length
    osl_stdev: 128                      # Output length std dev (~25% variance)
    osl_min: 256                        # Minimum output (brief answers)
    osl_max: 1024                       # Maximum output (detailed responses)
    variability: true                   # Enable statistical distribution
    backend: "openai-chat"
    vllm_args:
      - "--dtype=auto"                  # Fallback dtype - overridden by model-specific dtype
      - "--no-enable-prefix-caching"    # Baseline mode: no prefix caching
      - "--max-model-len=4096"          # Limit model context to workload needs (max 2048 tokens)
    kv_cache_space: "40GiB"             # Fallback value - should be overridden by model-specific kv_cache_sizes

  # Code generation workload with variability (realistic output variance)
  code_var:
    workload_type: "code_var"
    isl: 1024                           # Mean input length
    isl_stdev: 256                      # Input length std dev (~25% variance)
    isl_min: 512                        # Minimum input (simple requests)
    isl_max: 2048                       # Maximum input (complex specs)
    osl: 1024                           # Mean output length
    osl_stdev: 256                      # Output length std dev (~25% variance)
    osl_min: 512                        # Minimum output (small functions)
    osl_max: 2048                       # Maximum output (large modules)
    variability: true                   # Enable statistical distribution
    backend: "openai-completions"
    vllm_args:
      - "--dtype=auto"                  # Fallback dtype - overridden by model-specific dtype
      - "--no-enable-prefix-caching"    # Baseline mode: no prefix caching
      - "--max-model-len=8192"          # Limit model context to workload needs (max 4096 tokens)
    kv_cache_space: "40GiB"             # Fallback value - should be overridden by model-specific kv_cache_sizes

# ============================================================================
# Prefix Caching Mode Configurations
# ============================================================================
# Used to toggle between baseline (no caching) and production (with caching) testing

caching_modes:
  baseline:
    description: "Baseline performance without caching optimizations"
    vllm_args:
      - "--no-enable-prefix-caching"

  production:
    description: "Production configuration with prefix caching enabled"
    vllm_args:
      - "--enable-prefix-caching"
