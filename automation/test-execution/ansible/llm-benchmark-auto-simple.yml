---
# Simple Auto LLM Test - For Core Sweep Use
# This is a streamlined version without the initial setup
# Expects: test_model, workload_type, requested_cores, test_run_id already set

# Detect NUMA topology and allocate cores
- name: Detect NUMA and Allocate Cores
  hosts: dut
  become: true
  tasks:
    - name: Detect NUMA topology
      ansible.builtin.include_tasks:
        file: playbooks/common/tasks/detect-numa-topology.yml

    - name: Allocate cores from count
      ansible.builtin.include_tasks:
        file: playbooks/common/tasks/allocate-cores-from-count.yml

    - ansible.builtin.set_fact:
        current_core_config: "{{ auto_core_config }}"
      delegate_to: localhost
      delegate_facts: true

# Start vLLM
- name: Start vLLM
  hosts: dut
  become: true
  vars:
    core_configuration: "{{ hostvars['localhost']['current_core_config'] }}"
  roles:
    - role: vllm_server

# Health Check
- ansible.builtin.import_playbook: health-check.yml

# Run Benchmark
- name: Run GuideLLM
  hosts: load_generator
  become: true
  vars:
    core_configuration: "{{ hostvars['localhost']['current_core_config'] }}"
  roles:
    - role: hf_token
      tasks_from: setup-optional
    - role: benchmark_guidellm

# Tag Results & Collect
- name: Tag and Collect
  hosts: load_generator
  gather_facts: false
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    core_configuration: "{{ hostvars['localhost']['current_core_config'] }}"
  tasks:
    - ansible.builtin.copy:
        content: |
          {
            "test_run_id": "{{ test_run_id }}",
            "config_type": "auto",
            "core_config_name": "{{ core_configuration.name }}",
            "core_count": {{ core_configuration.cores }},
            "cpuset_cpus": "{{ core_configuration.cpuset_cpus }}",
            "cpuset_mems": "{{ core_configuration.cpuset_mems }}",
            "tensor_parallel": {{ core_configuration.tensor_parallel }},
            "omp_num_threads": {{ core_configuration.omp_num_threads | default('null') }},
            "omp_threads_bind": "{{ core_configuration.omp_threads_bind | default('null') }}",
            "model": "{{ test_model }}",
            "workload": "{{ workload_type }}",
            "timestamp": "{{ ansible_date_time.iso8601 }}",
            "test_duration": "{{ test_duration_string | default('unknown') }}",
            "test_duration_seconds": {{ test_duration_seconds | default('null') }}
          }
        dest: "{{ bench_config.results_dir }}/{{ test_model | replace('/', '__') }}/{{ workload_type }}/{{ core_configuration.name }}/test-metadata.json"

# Collect Logs
- name: Collect Logs
  hosts: dut
  become: true
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    core_configuration: "{{ hostvars['localhost']['current_core_config'] }}"
  roles:
    - role: results_collector
      vars:
        log_collection_dest: "{{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/"
        journald_identifier: "vllm-{{ workload_type }}-{{ core_configuration.cores }}c-tp{{ core_configuration.tensor_parallel }}"
        log_filename_prefix: "vllm-server"
        journald_time_range: "1 hour ago"
