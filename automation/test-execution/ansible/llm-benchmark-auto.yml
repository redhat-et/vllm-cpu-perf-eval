---
# Auto-Configured LLM Test with GuideLLM
# User provides simple core count (e.g., 8, 16, 32) and Ansible auto-configures NUMA/cpuset
# Alternative to run-guidellm-test.yml which requires manual core_config_name
#
# Usage:
#   ansible-playbook playbooks/llm/run-guidellm-test-auto.yml \
#     -i inventory/example-full-config.yml \
#     -e "test_model=meta-llama/Llama-3.2-1B-Instruct" \
#     -e "workload_type=summarization" \
#     -e "requested_cores=16"
#     -e "requested_tensor_parallel=2"  # optional, auto-calculated if not specified (valid: 1, 2, 4, 8)

- name: "Auto-Configured LLM Test - Setup"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Detect if running from AWX
      ansible.builtin.set_fact:
        is_awx_job: "{{ lookup('env', 'AWX_JOB_ID') | length > 0 }}"
        local_results_base: "{{ lookup('env', 'HOME') ~ '/benchmark-results' if (lookup('env', 'AWX_JOB_ID') | length > 0) else playbook_dir ~ '/../../../results/llm' }}"

    - name: Set vLLM mode early for validation
      ansible.builtin.set_fact:
        vllm_mode: "{{ vllm_endpoint.mode | default('managed') }}"

    - name: Validate required variables are defined (managed mode)
      ansible.builtin.assert:
        that:
          - test_model is defined
          - test_model != '__AUTO_DETECT__'
          - workload_type is defined
          - requested_cores is defined
          - requested_cores is not none
        fail_msg: |
          Missing required variables. Please provide:
          -e "test_model=<model>"
          -e "workload_type=<summarization|chat|code|rag>"
          -e "requested_cores=<8|16|32|64|...>"

          Note: For core sweeps, use llm-core-sweep-auto.yml instead with:
          -e "requested_cores_list=[8,16,32,64]"

          Note: Auto-detection only works in external mode
      when: vllm_mode == 'managed'

    - name: Validate required variables are defined (external mode)
      ansible.builtin.assert:
        that:
          - workload_type is defined
        fail_msg: |
          Missing required variables. Please provide:
          -e "workload_type=<summarization|chat|code|rag>"
          Note: test_model is optional in external mode (will be queried from endpoint)
      when: vllm_mode == 'external'

    - name: Warn if cores specified in external mode
      ansible.builtin.debug:
        msg:
          - "⚠️  Warning: requested_cores={{ requested_cores }} specified but not used in external mode"
          - "   External endpoints have their own CPU allocation - core count will be ignored"
          - "   Core count will be set to 0 for metadata purposes"
      when:
        - vllm_mode == 'external'
        - requested_cores is defined

    - name: Override core count to 0 for external mode
      ansible.builtin.set_fact:
        requested_cores: 0
      when:
        - vllm_mode == 'external'

    - name: Validate requested_cores is a positive integer (managed mode only)
      ansible.builtin.assert:
        that:
          - requested_cores | int > 0
          - requested_cores | int == requested_cores | float
        fail_msg: "requested_cores must be a positive integer, got: {{ requested_cores }}"
      when: vllm_mode == 'managed'

    - name: Validate workload_type is supported
      ansible.builtin.assert:
        that:
          - workload_type in test_configs.keys()
        fail_msg: |
          Unsupported workload_type: {{ workload_type }}
          Supported workloads: {{ test_configs.keys() | list | join(', ') }}

    - name: Validate guidellm_profile if provided
      ansible.builtin.assert:
        that:
          - guidellm_profile in ['sweep', 'synchronous', 'concurrent', 'throughput']
        fail_msg: |
          Invalid guidellm_profile: {{ guidellm_profile }}
          Supported profiles: sweep, synchronous, concurrent, throughput
      when: guidellm_profile is defined

    - name: Validate guidellm_max_seconds if provided
      ansible.builtin.assert:
        that:
          - guidellm_max_seconds | int > 0
          - guidellm_max_seconds | int <= 3600
        fail_msg: "guidellm_max_seconds must be between 1 and 3600, got: {{ guidellm_max_seconds }}"
      when: guidellm_max_seconds is defined

    - name: Validate guidellm_max_requests if provided
      ansible.builtin.assert:
        that:
          - guidellm_max_requests | int > 0
        fail_msg: "guidellm_max_requests must be a positive integer, got: {{ guidellm_max_requests }}"
      when: guidellm_max_requests is defined

    - name: Generate test run ID if not provided
      ansible.builtin.set_fact:
        test_run_id: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
      when: test_run_id is not defined

    - name: Handle external endpoint model detection/validation
      when: vllm_mode == 'external'
      block:
        - name: Validate external endpoint URL is configured
          ansible.builtin.assert:
            that:
              - vllm_endpoint.external.url is defined
              - vllm_endpoint.external.url is not none
              - vllm_endpoint.external.url | length > 0
            fail_msg: |
              External endpoint URL is required when mode=external.
              Please set VLLM_ENDPOINT_URL environment variable or configure
              vllm_endpoint.external.url in inventory/group_vars/all/endpoints.yml

              Example:
                export VLLM_ENDPOINT_URL=http://your-vllm-host:8000

        - name: Get model from external endpoint
          ansible.builtin.uri:
            url: "{{ vllm_endpoint.external.url }}/v1/models"
            method: GET
            status_code: 200
            headers: "{{ {'Authorization': 'Bearer ' + (vllm_endpoint.external.api_key | default(''))} if (vllm_endpoint.external.api_key_enabled | default(false)) else {} }}"
          register: external_models_response
          delegate_to: localhost

        - name: Validate endpoint returned at least one model
          ansible.builtin.assert:
            that:
              - external_models_response.json.data | length > 0
            fail_msg: |
              External endpoint returned no models.
              URL: {{ vllm_endpoint.external.url }}/v1/models
              Ensure the vLLM server has a model loaded.

        - name: Extract model name from endpoint
          ansible.builtin.set_fact:
            endpoint_model: "{{ external_models_response.json.data[0].id }}"

        - name: Use endpoint model if test_model not provided or set to auto-detect
          ansible.builtin.set_fact:
            test_model: "{{ endpoint_model }}"
            actual_model: "{{ endpoint_model }}"
            model_source: "auto-detected"
            cacheable: true
          when: test_model is not defined or test_model == '__AUTO_DETECT__'

        - name: Set actual_model to test_model if explicitly provided
          ansible.builtin.set_fact:
            actual_model: "{{ test_model }}"
            model_source: "specified"
            cacheable: true
          when: test_model is defined and test_model != '__AUTO_DETECT__'

        - name: Validate test_model matches endpoint if provided
          ansible.builtin.assert:
            that:
              - test_model == endpoint_model
            fail_msg: |
              Model mismatch detected!
              Specified: {{ test_model }}
              Endpoint serving: {{ endpoint_model }}

              Either omit test_model to auto-detect, or ensure it matches the running model.
          when: test_model is defined and test_model != '__AUTO_DETECT__' and test_model != endpoint_model

        - name: Display model source
          ansible.builtin.debug:
            msg: "Detected model from endpoint: {{ actual_model }}"

    - name: Set actual_model for managed mode
      ansible.builtin.set_fact:
        actual_model: "{{ test_model }}"
        model_source: "specified"
      when: vllm_mode == 'managed'

    - name: Display auto-config test information
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Auto-Configured LLM Test"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Test Run ID: {{ test_run_id }}"
          - "Model: {{ actual_model }}{{ ' (detected from endpoint)' if vllm_mode == 'external' else '' }}"
          - "Workload: {{ workload_type }}"
          - "Requested Cores: {{ requested_cores }}"
          - "DUT: {{ groups['dut'][0] }} ({{ hostvars[groups['dut'][0]]['ansible_host'] }})"
          - "Load Generator: {{ groups['load_generator'][0] }} ({{ hostvars[groups['load_generator'][0]]['ansible_host'] }})"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Set fallback core configuration for external mode
      ansible.builtin.set_fact:
        core_configuration:
          name: "external-endpoint"
          cores: "{{ requested_cores | int }}"
          cpuset_cpus: "n/a"
          cpuset_mems: "n/a"
          tensor_parallel: "{{ requested_tensor_parallel | default(1) | int }}"  # External mode: assume TP=1 if not specified
      when: vllm_mode == 'external'

    - name: Display vLLM configuration
      ansible.builtin.debug:
        msg:
          - "vLLM Mode: {{ vllm_mode }}"
          - "{{ 'External Endpoint: ' + vllm_endpoint.external.url if vllm_mode == 'external' else 'Managed on DUT: ' + groups['dut'][0] }}"

# ==============================================================================
# STEP 1: Detect NUMA Topology on DUT (Managed Mode Only)
# ==============================================================================

- name: "Auto-Configured LLM Test - Detect NUMA Topology"
  hosts: dut
  become: true
  gather_facts: false

  pre_tasks:
    - name: End play if in external mode
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['vllm_mode'] == 'external'

  tasks:
    - block:
        - name: Detect NUMA topology on DUT
          ansible.builtin.include_role:
            name: common
            tasks_from: detect-numa-topology

        - name: Get CPU model name for platform identification
          ansible.builtin.shell: |
            lscpu | grep -i '^Model name' | sed 's/^[Mm]odel name:[[:space:]]*//' | head -1
          register: cpu_model_raw
          changed_when: false

        - name: Set platform name from CPU model (sanitized)
          ansible.builtin.set_fact:
            dut_platform_name: "{{ cpu_model_raw.stdout | trim | regex_replace('[^a-zA-Z0-9]', '_') | regex_replace('_+', '_') | regex_replace('^_|_$', '') }}"

        - name: Save raw platform name to localhost
          ansible.builtin.set_fact:
            dut_platform_raw: "{{ cpu_model_raw.stdout | trim }}"
          delegate_to: localhost
          delegate_facts: true

        - name: Save sanitized platform name to localhost for later use
          ansible.builtin.set_fact:
            dut_platform_name: "{{ dut_platform_name }}"
          delegate_to: localhost
          delegate_facts: true

        - name: Display detected platform
          ansible.builtin.debug:
            msg:
              - "Platform detected: {{ cpu_model_raw.stdout | trim }}"
              - "Sanitized: {{ dut_platform_name }}"

      when: hostvars['localhost']['vllm_mode'] == 'managed'
# ==============================================================================
# STEP 2: Allocate Cores from Detected Topology (Managed Mode Only)
# ==============================================================================

- name: "Auto-Configured LLM Test - Allocate Cores"
  hosts: dut
  become: true
  gather_facts: false
  vars:
    requested_cores: "{{ hostvars['localhost']['requested_cores'] }}"
    requested_tensor_parallel: "{{ hostvars['localhost']['requested_tensor_parallel'] | default(None) }}"
    requested_omp_threads: "{{ hostvars['localhost']['requested_omp_threads'] | default(None) }}"
    requested_omp_bind: "{{ hostvars['localhost']['requested_omp_bind'] | default(None) }}"

  pre_tasks:
    - name: End play if in external mode
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['vllm_mode'] == 'external'

  tasks:
    - name: Allocate cores from NUMA topology
      ansible.builtin.include_role:
        name: common
        tasks_from: allocate-cores-from-count

    - name: Save auto-allocated config to localhost
      ansible.builtin.set_fact:
        core_configuration: "{{ auto_core_config }}"
      delegate_to: localhost
      delegate_facts: true
# ==============================================================================
# STEP 3: Start vLLM with Auto-Allocated Configuration (Managed Mode Only)
# ==============================================================================
# Note: vllm_server role handles HF token setup and clean restart internally

- name: "Auto-Configured LLM Test - Start vLLM"
  hosts: dut
  become: true
  gather_facts: false
  vars:
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"

  pre_tasks:
    - name: End play if in external mode
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['vllm_mode'] == 'external'

  roles:
    - role: vllm_server
# ==============================================================================
# STEP 3-External: Configure External Endpoint (External Mode Only)
# ==============================================================================

- name: "Step 3-External - Configure External Endpoint"
  hosts: load_generator
  gather_facts: false

  tasks:
    - block:
        - name: Validate external endpoint URL
          ansible.builtin.assert:
            that:
              - vllm_endpoint.external.url is defined
              - vllm_endpoint.external.url is not none
              - vllm_endpoint.external.url | length > 0
            fail_msg: "External endpoint URL is required when mode=external"

        - name: Parse external endpoint URL
          ansible.builtin.set_fact:
            external_endpoint_parsed: "{{ vllm_endpoint.external.url | urlsplit }}"

        - name: Validate parsed endpoint URL
          ansible.builtin.assert:
            that:
              - external_endpoint_parsed.hostname is defined
              - external_endpoint_parsed.hostname is not none
              - external_endpoint_parsed.hostname | length > 0
              - external_endpoint_parsed.scheme is defined
              - external_endpoint_parsed.scheme in ['http', 'https']
            fail_msg: |
              Invalid external endpoint URL: {{ vllm_endpoint.external.url }}
              Parsed hostname: {{ external_endpoint_parsed.hostname | default('MISSING') }}
              Parsed scheme: {{ external_endpoint_parsed.scheme | default('MISSING') }}
              URL must be a valid HTTP/HTTPS URL with a hostname.

        - name: Override bench_config for external endpoint
          ansible.builtin.set_fact:
            bench_config: "{{ bench_config | combine({'vllm_host': external_endpoint_parsed.hostname, 'vllm_port': external_endpoint_parsed.port | default(8000) | int}) }}"

        - name: Setup API key if enabled
          ansible.builtin.include_role:
            name: common
            tasks_from: setup-vllm-api-key
          when: vllm_endpoint.external.api_key.enabled | default(false) | bool

        - name: Display external endpoint configuration
          ansible.builtin.debug:
            msg:
              - "External vLLM Endpoint: {{ vllm_endpoint.external.url }}"
              - "Parsed Host: {{ bench_config.vllm_host }}"
              - "Parsed Port: {{ bench_config.vllm_port }}"
              - "{{ 'API Key: Enabled' if vllm_api_key is defined else 'API Key: Not configured' }}"

      when: hostvars['localhost']['vllm_mode'] == 'external'
# ==============================================================================
# STEP 4: Health Check
# ==============================================================================

- name: "Auto-Configured LLM Test - Health Check"
  ansible.builtin.import_playbook: health-check.yml

# ==============================================================================
# STEP 5: Run GuideLLM Benchmark
# ==============================================================================

- name: "Auto-Configured LLM Test - Run GuideLLM"
  hosts: load_generator
  become: true
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    actual_model: "{{ hostvars['localhost']['actual_model'] }}"
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"

  pre_tasks:
    - name: Record benchmark start time
      ansible.builtin.set_fact:
        benchmark_start_time: "{{ lookup('pipe', 'date +%s') }}"
      delegate_to: localhost
      delegate_facts: true

    - name: Save vLLM endpoint URL for metrics collection (managed mode)
      ansible.builtin.set_fact:
        vllm_metrics_url: "http://{{ bench_config.vllm_host }}:{{ bench_config.vllm_port }}"
      delegate_to: localhost
      delegate_facts: true
      when:
        - not (skip_metrics_collection | default(false) | bool)
        - hostvars['localhost']['vllm_mode'] == 'managed'

    - name: Check if external endpoint exposes metrics
      ansible.builtin.uri:
        url: "{{ vllm_endpoint.external.url }}/metrics"
        method: GET
        status_code: [200, 404, 403]
        timeout: 5
      register: external_metrics_check
      delegate_to: localhost
      failed_when: false
      when:
        - not (skip_metrics_collection | default(false) | bool)
        - hostvars['localhost']['vllm_mode'] == 'external'

    - name: Set external metrics URL if available
      ansible.builtin.set_fact:
        vllm_metrics_url: "{{ vllm_endpoint.external.url }}"
        external_metrics_available: true
      delegate_to: localhost
      delegate_facts: true
      when:
        - not (skip_metrics_collection | default(false) | bool)
        - hostvars['localhost']['vllm_mode'] == 'external'
        - external_metrics_check.status is defined
        - external_metrics_check.status == 200

    - name: Display external metrics availability
      ansible.builtin.debug:
        msg:
          - "{{ '✅ External endpoint exposes /metrics - server metrics collection ENABLED' if (external_metrics_check.status | default(0) == 200) else '⚠️  External endpoint does not expose /metrics - server metrics collection DISABLED' }}"
          - "{{ 'Metrics URL: ' + vllm_endpoint.external.url + '/metrics' if (external_metrics_check.status | default(0) == 200) else 'Client-side metrics (GuideLLM) will still be collected' }}"
      when:
        - not (skip_metrics_collection | default(false) | bool)
        - hostvars['localhost']['vllm_mode'] == 'external'

    - name: Start vLLM metrics collection
      block:
        - name: Calculate expected test duration
          ansible.builtin.set_fact:
            estimated_test_duration: "{{ (guidellm_max_seconds | default(600) | int) + 120 }}"  # Add 2min buffer

        - name: Start metrics collector in background
          ansible.builtin.include_role:
            name: vllm_metrics_collector
          vars:
            vllm_url: "{{ hostvars['localhost']['vllm_metrics_url'] }}"
            results_path: "{{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ hostvars['localhost']['test_run_id'] }}/{{ core_configuration.name }}"
            metrics_collection_interval: 10
            metrics_collection_duration: "{{ estimated_test_duration }}"
            test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
            enable_vllm_metrics_collection: true
      delegate_to: localhost
      become: false
      when:
        - not (skip_metrics_collection | default(false) | bool)
        - >-
          hostvars['localhost']['vllm_mode'] == 'managed' or
          (hostvars['localhost']['vllm_mode'] == 'external' and
           hostvars['localhost'].get('external_metrics_available', false))

  roles:
    - role: hf_token
      tasks_from: setup-optional
    - role: benchmark_guidellm

  post_tasks:
    - name: Stop vLLM metrics collection
      block:
        - name: Stop metrics collector
          ansible.builtin.include_role:
            name: vllm_metrics_collector
            tasks_from: stop
          vars:
            results_path: "{{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ hostvars['localhost']['test_run_id'] }}/{{ core_configuration.name }}"
            enable_vllm_metrics_collection: true
      delegate_to: localhost
      become: false
      when:
        - not (skip_metrics_collection | default(false) | bool)
        - >-
          hostvars['localhost']['vllm_mode'] == 'managed' or
          (hostvars['localhost']['vllm_mode'] == 'external' and
           hostvars['localhost'].get('external_metrics_available', false))

# ==============================================================================
# STEP 6: Collect Results
# ==============================================================================

- name: "Auto-Configured LLM Test - Collect Results"
  hosts: load_generator
  gather_facts: false
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    actual_model: "{{ hostvars['localhost']['actual_model'] }}"
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"

  tasks:
    - name: Tag results with auto-config metadata
      ansible.builtin.copy:
        content: |
          {
            "test_run_id": "{{ test_run_id }}",
            "config_type": "auto",
            "core_config_name": "{{ core_configuration.name }}",
            "core_count": {{ core_configuration.cores }},
            "cpuset_cpus": "{{ core_configuration.cpuset_cpus }}",
            "cpuset_mems": "{{ core_configuration.cpuset_mems }}",
            "tensor_parallel": {{ core_configuration.tensor_parallel }},
            "omp_num_threads": {{ core_configuration.omp_num_threads | default('null') }},
            "omp_threads_bind": {{ core_configuration.omp_threads_bind | default('null') }},
            "model": "{{ actual_model }}",
            "model_source": "{{ hostvars['localhost']['model_source'] | default('specified') }}",
            "workload": "{{ workload_type }}",
            "platform": "{{ hostvars['localhost']['dut_platform_name'] | default('unknown') }}",
            "backend": "{{ hostvars['localhost']['vllm_backend'] | default('upstream') }}",
            "vllm_version": "{{ hostvars['localhost']['vllm_version'] | default('unknown') }}",
            "vllm_dtype": "{{ vllm_dtype | default('auto') }}",
            "vllm_kv_cache_size": "{{ vllm_kv_cache | default('auto') }}",
            "vllm_max_model_len": "{{ vllm_max_model_len | default('auto') }}",
            "vllm_caching_mode": "{{ vllm_caching_mode | default('baseline') }}",
            "vllm_mode": "{{ hostvars['localhost']['vllm_mode'] }}",
            "vllm_endpoint_url": "{{ vllm_endpoint.external.url if hostvars['localhost']['vllm_mode'] == 'external' else 'n/a' }}",
            "guidellm_version": "{{ hostvars['localhost']['guidellm_version'] | default('unknown') }}",
            "timestamp": "{{ lookup('pipe', 'date -Iseconds') }}",
            "test_duration": "{{ test_duration_string | default('unknown') }}",
            "test_duration_seconds": {{ test_duration_seconds | default('null') }}
          }
        dest: "{{ bench_config.results_dir }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/test-metadata.json"

    # Skip result fetching when running as part of a core sweep
    # The collect-sweep-results.yml playbook will fetch all results at once
    - name: Ensure local results directory exists
      ansible.builtin.file:
        path: "{{ hostvars['localhost']['local_results_base'] }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      when: is_core_sweep is not defined or not is_core_sweep

    - name: Fetch results to local machine
      ansible.posix.synchronize:
        src: "{{ bench_config.results_dir }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/"
        dest: "{{ hostvars['localhost']['local_results_base'] }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/"
        mode: pull
        recursive: true
      when: is_core_sweep is not defined or not is_core_sweep

    # Copy GuideLLM log from controller to final results directory
    # The log is fetched to controller's ~/benchmark-results by the benchmark_guidellm role
    # but synchronize above pulls from load_generator, so we need this separate copy
    - name: Copy GuideLLM log to final results directory
      ansible.builtin.copy:
        src: "{{ bench_config.results_dir }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/guidellm.log"
        dest: "{{ hostvars['localhost']['local_results_base'] }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/guidellm.log"
      delegate_to: localhost
      failed_when: false  # Don't fail if guidellm.log doesn't exist
      when: is_core_sweep is not defined or not is_core_sweep

    # Clean up temporary results from controller's ~/benchmark-results
    # Remove the entire test run directory since all files have been copied to final results
    - name: Remove temporary results directory from controller
      ansible.builtin.file:
        path: "{{ bench_config.results_dir }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}"
        state: absent
      delegate_to: localhost
      when: is_core_sweep is not defined or not is_core_sweep

    - name: Extract per-benchmark timings from benchmarks.json
      ansible.builtin.command:
        cmd: >-
          python3 {{ playbook_dir }}/scripts/extract_benchmark_timings.py
          {{ hostvars['localhost']['local_results_base'] }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/benchmarks.json
          {{ hostvars['localhost']['local_results_base'] }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/test-metadata.json
      delegate_to: localhost
      register: timing_extraction
      changed_when: false
      failed_when: false
      when: is_core_sweep is not defined or not is_core_sweep

    - name: Display timing extraction result
      ansible.builtin.debug:
        msg: "{{ timing_extraction.stdout_lines }}"
      when:
        - timing_extraction.stdout_lines is defined
        - is_core_sweep is not defined or not is_core_sweep

    - name: Display results location (standalone run)
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✓ Auto-configured test completed!"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Configuration: {{ core_configuration.name }}"
          - "  CPUs: {{ core_configuration.cpuset_cpus }}"
          - "  NUMA: {{ core_configuration.cpuset_mems }}"
          - "Results: {{ '~/benchmark-results' if hostvars['localhost']['is_awx_job'] else 'results/llm' }}/{{ actual_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      when: is_core_sweep is not defined or not is_core_sweep

    - name: Display completion status (core sweep iteration)
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✓ Core sweep iteration completed!"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Configuration: {{ core_configuration.name }}"
          - "  CPUs: {{ core_configuration.cpuset_cpus }}"
          - "  NUMA: {{ core_configuration.cpuset_mems }}"
          - "Note: Results will be collected after all iterations complete"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      when:
        - is_core_sweep is defined
        - is_core_sweep | bool

# ==============================================================================
# STEP 7: Collect Logs (Managed Mode Only)
# ==============================================================================

- name: "Auto-Configured LLM Test - Collect Logs"
  hosts: dut
  become: true
  gather_facts: false
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"

  pre_tasks:
    - name: End play if in external mode
      ansible.builtin.meta: end_play
      when: hostvars['localhost']['vllm_mode'] | default('managed') == 'external'

  roles:
    - role: results_collector
      vars:
        log_collection_dest: "{{ playbook_dir }}/../../../results/llm/{{ hostvars['localhost']['actual_model'] | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}/"
        journald_identifier: "vllm-{{ workload_type }}-{{ core_configuration.cores }}c-tp{{ core_configuration.tensor_parallel }}"
        log_filename_prefix: "vllm-server"
        journald_time_range: "1 hour ago"
# ==============================================================================
# STEP 8: Publish Results to Prometheus Pushgateway (Optional)
# ==============================================================================

- name: "Publish Results to Prometheus Pushgateway"
  hosts: localhost
  gather_facts: true
  vars:
    test_run_id: "{{ hostvars['localhost']['test_run_id'] }}"
    core_configuration: "{{ hostvars['localhost']['core_configuration'] }}"
    results_path: "{{ playbook_dir }}/../../../results/llm/{{ test_model | replace('/', '__') }}/{{ workload_type }}-{{ test_run_id }}/{{ core_configuration.name }}"

  tasks:
    - name: Check if Prometheus publishing is enabled
      ansible.builtin.debug:
        msg: "Prometheus publishing: {{ 'enabled' if (publish_to_prometheus | default(false) | bool) else 'disabled' }}"

    - name: Set publishing metadata
      ansible.builtin.set_fact:
        _publish_platform: "{{ hostvars['localhost']['dut_platform_name'] | default('Unknown') }}"
        _publish_backend: "{{ hostvars['localhost']['vllm_backend'] | default('upstream') }}"
        _publish_version: "{{ hostvars['localhost']['vllm_version'] | default('unknown') }}"

    - name: Publish benchmark results to Prometheus
      ansible.builtin.include_role:
        name: metrics_publisher
      vars:
        platform_name: "{{ _publish_platform }}"
        backend_type: "{{ _publish_backend }}"
        vllm_version: "{{ _publish_version }}"
      when: publish_to_prometheus | default(false) | bool

  tags:
    - publish
    - prometheus

# ==============================================================================
# STEP 9: Cleanup SSH Tunnel (Optional)
# ==============================================================================

- name: "Auto-Configured LLM Test - Cleanup SSH Tunnel"
  hosts: localhost
  gather_facts: false

  tasks:
    - block:
        - name: Get tunnel PID
          ansible.builtin.shell: |
            lsof -ti :8000 -sTCP:LISTEN | head -1
          register: tunnel_pid_check
          failed_when: false
          changed_when: false

        - name: Kill SSH tunnel
          ansible.builtin.command: "kill {{ tunnel_pid_check.stdout }}"
          when: tunnel_pid_check.stdout | length > 0
          changed_when: true

        - name: Display tunnel cleanup status
          ansible.builtin.debug:
            msg: "{{ '✓ SSH tunnel cleaned up (PID: ' + tunnel_pid_check.stdout + ')' if tunnel_pid_check.stdout else '✓ No SSH tunnel to clean up' }}"

      when:
        - cleanup_tunnel_after_test | default(false) | bool
        - vllm_mode == 'managed'

# ==============================================================================
# STEP 10: Optional vLLM Container Cleanup (Managed Mode Only)
# ==============================================================================

- name: "Auto-Configured LLM Test - Optional Cleanup"
  hosts: dut
  become: true
  gather_facts: false

  pre_tasks:
    - name: End play if in external mode or cleanup disabled
      ansible.builtin.meta: end_play
      when: >-
        hostvars['localhost']['vllm_mode'] | default('managed') == 'external' or
        not (cleanup_after_test | default(false) | bool)

  tasks:
    - name: Stop and remove vLLM container
      containers.podman.podman_container:
        name: "{{ vllm_container_name }}"
        state: absent

    - name: Display cleanup status
      ansible.builtin.debug:
        msg: "✓ vLLM container stopped and removed"
