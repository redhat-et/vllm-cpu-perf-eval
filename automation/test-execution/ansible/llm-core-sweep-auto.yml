---
# Auto-Configured Core Sweep for LLM Models
# User provides simple core counts list and Ansible auto-generates configurations
# Alternative to run-core-sweep.yml which requires pre-defined core_config_names
#
# Usage:
#   ansible-playbook playbooks/llm/run-core-sweep-auto.yml \
#     -i inventory/example-full-config.yml \
#     -e "test_model=meta-llama/Llama-3.2-1B-Instruct" \
#     -e "workload_type=summarization" \
#     -e "requested_cores_list=[8,16,32,64]"

- name: "Auto Core Sweep - Setup"
  hosts: localhost
  gather_facts: false
  vars:
    test_run_id: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - test_model is defined
          - workload_type is defined
          - requested_cores_list is defined
        fail_msg: |
          Missing required variables. Please provide:
          -e "test_model=<model>"
          -e "workload_type=<summarization|chat|code|rag>"
          -e "requested_cores_list=[8,16,32,64]"

    - name: Convert requested_cores_list to list if string
      ansible.builtin.set_fact:
        requested_cores_list: "{{ requested_cores_list | from_yaml if requested_cores_list is string else requested_cores_list }}"

    - name: Store test run ID in hostvars
      ansible.builtin.set_fact:
        test_run_id: "{{ test_run_id }}"

    - name: Display auto core sweep information
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Auto-Configured Core Sweep Test"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Test Run ID: {{ test_run_id }}"
          - "Model: {{ test_model }}"
          - "Workload: {{ workload_type }}"
          - "Core Counts: {{ requested_cores_list }}"
          - "DUT: {{ groups['dut'][0] }} ({{ hostvars[groups['dut'][0]]['ansible_host'] }})"
          - "Load Generator: {{ groups['load_generator'][0] }} ({{ hostvars[groups['load_generator'][0]]['ansible_host'] }})"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Set vLLM mode
      ansible.builtin.set_fact:
        vllm_mode: "{{ vllm_endpoint.mode | default('managed') }}"

    - name: Display vLLM configuration
      ansible.builtin.debug:
        msg:
          - "vLLM Mode: {{ vllm_mode }}"
          - "{{ 'External Endpoint: ' + vllm_endpoint.external.url if vllm_mode == 'external' else 'Managed on DUT: ' + groups['dut'][0] }}"

    - name: Fail if external mode is used with core sweep
      ansible.builtin.fail:
        msg:
          - "❌ ERROR: Core sweep is not supported in external mode."
          - "External endpoints cannot have their core configuration changed."
          - "Use llm-benchmark-auto.yml for external endpoint testing instead."
      when: vllm_mode == 'external'

# ==============================================================================
# STEP 1: Detect NUMA Topology (once, Managed Mode Only)
# ==============================================================================

- name: "Auto Core Sweep - Detect NUMA Topology"
  hosts: dut
  become: true

  tasks:
    - block:
        - name: Detect NUMA topology on DUT
          ansible.builtin.include_role:
            name: common
            tasks_from: detect-numa-topology

        - name: Save topology to localhost
          ansible.builtin.set_fact:
            dut_numa_topology: "{{ numa_topology }}"
          delegate_to: localhost
          delegate_facts: true

      when: hostvars['localhost']['vllm_mode'] | default('managed') == 'managed'
# ==============================================================================
# STEP 2: Setup HuggingFace Token (once, Managed Mode Only)
# ==============================================================================

- name: "Auto Core Sweep - Setup HF Token"
  hosts: dut
  become: true

  tasks:
    - block:
        - name: Setup HuggingFace token
          ansible.builtin.include_role:
            name: hf_token
            tasks_from: setup-optional

      when: hostvars['localhost']['vllm_mode'] | default('managed') == 'managed'
# ==============================================================================
# EXTERNAL MODE: Configure External Endpoint (Once)
# ==============================================================================

- name: "Configure External Endpoint"
  hosts: load_generator
  gather_facts: false

  tasks:
    - block:
        - name: Validate external endpoint URL
          ansible.builtin.assert:
            that:
              - vllm_endpoint.external.url is defined
              - vllm_endpoint.external.url is not none
              - vllm_endpoint.external.url | length > 0
            fail_msg: "External endpoint URL is required when mode=external"

        - name: Parse external endpoint URL
          ansible.builtin.set_fact:
            external_endpoint_parsed: "{{ vllm_endpoint.external.url | urlsplit }}"

        - name: Override bench_config for external endpoint
          ansible.builtin.set_fact:
            bench_config: "{{ bench_config | combine({'vllm_host': external_endpoint_parsed.hostname, 'vllm_port': external_endpoint_parsed.port | default(8000) | int}) }}"

        - name: Setup API key if enabled
          ansible.builtin.include_role:
            name: common
            tasks_from: setup-vllm-api-key
          when: vllm_endpoint.external.api_key.enabled | default(false) | bool

        - name: Display external endpoint configuration
          ansible.builtin.debug:
            msg:
              - "External vLLM Endpoint: {{ vllm_endpoint.external.url }}"
              - "Parsed Host: {{ bench_config.vllm_host }}"
              - "Parsed Port: {{ bench_config.vllm_port }}"
              - "{{ 'API Key: Enabled' if vllm_api_key is defined else 'API Key: Not configured' }}"

      when: hostvars['localhost']['vllm_mode'] == 'external'

- name: "Health Check - External Endpoint"
  ansible.builtin.import_playbook: health-check.yml
  when: hostvars['localhost']['vllm_mode'] == 'external'

# ==============================================================================
# MAIN LOOP: Iterate over core counts
# ==============================================================================
# Ansible doesn't support looping over playbook imports, so we delegate to the
# existing run-core-sweep.sh script which calls llm-benchmark-auto.yml multiple times

- name: "Auto Core Sweep - Run Benchmarks for Each Core Count"
  hosts: localhost
  gather_facts: false

  tasks:
    - block:
        - name: Convert core count list to comma-separated string
          ansible.builtin.set_fact:
            cores_csv: "{{ requested_cores_list | join(',') }}"

        - name: Build extra vars for core sweep script
          ansible.builtin.set_fact:
            sweep_extra_vars: ""

        - name: Add vllm_caching_mode to extra vars
          ansible.builtin.set_fact:
            sweep_extra_vars: "{{ sweep_extra_vars }} --extra-vars \"-e vllm_caching_mode={{ vllm_caching_mode | default('baseline') }}\""

        - name: Add guidellm_profile if defined
          ansible.builtin.set_fact:
            sweep_extra_vars: "{{ sweep_extra_vars }} --extra-vars \"-e guidellm_profile={{ guidellm_profile }}\""
          when: guidellm_profile is defined

        - name: Add guidellm_max_seconds if defined
          ansible.builtin.set_fact:
            sweep_extra_vars: "{{ sweep_extra_vars }} --extra-vars \"-e guidellm_max_seconds={{ guidellm_max_seconds }}\""
          when: guidellm_max_seconds is defined

        - name: Add guidellm_max_requests if defined
          ansible.builtin.set_fact:
            sweep_extra_vars: "{{ sweep_extra_vars }} --extra-vars \"-e guidellm_max_requests={{ guidellm_max_requests }}\""
          when: guidellm_max_requests is defined

        - name: Add guidellm_rate if defined
          ansible.builtin.set_fact:
            sweep_extra_vars: "{{ sweep_extra_vars }} --extra-vars \"-e guidellm_rate={{ guidellm_rate }}\""
          when: guidellm_rate is defined

        - name: Display core sweep configuration
          ansible.builtin.debug:
            msg:
              - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              - "Executing Core Sweep via run-core-sweep.sh"
              - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              - "Model: {{ test_model }}"
              - "Workload: {{ workload_type }}"
              - "Cores: {{ cores_csv }}"
              - "Extra vars: {{ sweep_extra_vars if sweep_extra_vars | length > 0 else 'none' }}"
              - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

        - name: Execute core sweep via run-core-sweep.sh
          ansible.builtin.shell:
            cmd: >-
              ./scripts/run-core-sweep.sh
              --model '{{ test_model }}'
              --workload '{{ workload_type }}'
              --cores '{{ cores_csv }}'
              {{ sweep_extra_vars }}
            chdir: "{{ playbook_dir }}"
          environment:
            ANSIBLE_INVENTORY: "{{ inventory_file }}"
          register: sweep_result
          changed_when: false

        - name: Display sweep execution summary
          ansible.builtin.debug:
            msg:
              - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              - "Core Sweep Execution Complete"
              - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              - "{{ sweep_result.stdout_lines[-5:] | default(['No output']) }}"

      when: hostvars['localhost']['vllm_mode'] | default('managed') == 'managed'
# ==============================================================================
# FINAL: Collect All Results
# ==============================================================================
# Note: run-core-sweep.sh already calls collect-sweep-results.yml, so results
# are already collected by the time we get here. This section is skipped.

# ==============================================================================
# SUMMARY
# ==============================================================================

- name: "Auto Core Sweep - Summary"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Display playbook completion
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "llm-core-sweep-auto.yml playbook completed"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Model: {{ test_model }}"
          - "Workload: {{ workload_type }}"
          - "Core counts: {{ requested_cores_list | join(', ') }}"
          - "Results collected by run-core-sweep.sh"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
