---
# Start Grafana Monitoring Stack
# Starts Prometheus and Grafana containers for real-time vLLM server metrics
#
# Usage:
#   ansible-playbook start-grafana.yml
#
# Requirements:
#   - docker-compose or podman-compose installed
#   - Port 3000 (Grafana), 9090 (Prometheus) available
#   - SSH tunnel to vLLM server for live metrics (optional, see below)

- name: "Start Grafana Monitoring Stack"
  hosts: localhost
  gather_facts: true

  vars:
    grafana_dir: "{{ playbook_dir }}/../grafana"
    compose_project_name: vllm-monitoring
    grafana_port: 3000
    prometheus_port_preferred: 9090
    prometheus_port_fallback: 9091
    health_check_timeout: 60
    health_check_interval: 5
    compose_file: "{{ 'docker-compose.macos.yml' if ansible_os_family == 'Darwin' else 'docker-compose.yml' }}"

  tasks:
    # ========================================================================
    # STEP 1: Detect OS and Container Runtime
    # ========================================================================

    - name: Detect operating system
      ansible.builtin.set_fact:
        is_macos: "{{ ansible_os_family == 'Darwin' }}"
        is_linux: "{{ ansible_os_family != 'Darwin' }}"

    - name: Display OS detection
      ansible.builtin.debug:
        msg:
          - "Operating System: {{ ansible_os_family }}"
          - "macOS: {{ is_macos }}"
          - "Linux: {{ is_linux }}"
          - "Compose file: {{ compose_file }}"

    # ========================================================================
    # STEP 2: Detect Container Runtime and Compose Tool
    # ========================================================================

    - name: Detect available compose tool
      block:
        - name: Check for environment variable override
          ansible.builtin.set_fact:
            compose_cmd_override: "{{ lookup('env', 'COMPOSE_CMD') }}"

        - name: Use environment variable if set
          ansible.builtin.set_fact:
            compose_cmd: "{{ compose_cmd_override }}"
            runtime_name: "{{ 'Docker' if 'docker' in compose_cmd_override else 'Podman' }}"
          when: compose_cmd_override != ""

        - name: Auto-detect compose tool
          block:
            - name: Check for docker-compose
              ansible.builtin.command: docker-compose --version
              register: docker_compose_check
              failed_when: false
              changed_when: false

            - name: Check for podman-compose
              ansible.builtin.command: podman-compose --version
              register: podman_compose_check
              failed_when: false
              changed_when: false

            - name: Set compose command (docker-compose)
              ansible.builtin.set_fact:
                compose_cmd: docker-compose
                runtime_name: Docker
              when: docker_compose_check.rc == 0

            - name: Set compose command (podman-compose)
              ansible.builtin.set_fact:
                compose_cmd: podman-compose
                runtime_name: Podman
              when:
                - docker_compose_check.rc != 0
                - podman_compose_check.rc == 0

            - name: Fail if no compose tool found
              ansible.builtin.fail:
                msg: |
                  Neither docker-compose nor podman-compose found!

                  Install one of the following:
                  - Docker Desktop (includes docker-compose)
                  - podman-compose: pip3 install podman-compose
              when:
                - docker_compose_check.rc != 0
                - podman_compose_check.rc != 0
          when: compose_cmd_override == ""

    # ========================================================================
    # STEP 3: Pre-flight Checks
    # ========================================================================

    - name: Check if Grafana directory exists
      ansible.builtin.stat:
        path: "{{ grafana_dir }}"
      register: grafana_dir_stat

    - name: Fail if Grafana directory not found
      ansible.builtin.fail:
        msg: "Grafana directory not found: {{ grafana_dir }}"
      when: not grafana_dir_stat.stat.exists

    - name: Check if docker-compose.yml exists
      ansible.builtin.stat:
        path: "{{ grafana_dir }}/docker-compose.yml"
      register: compose_file_stat

    - name: Fail if docker-compose.yml not found
      ansible.builtin.fail:
        msg: "docker-compose.yml not found in {{ grafana_dir }}"
      when: not compose_file_stat.stat.exists

    # ========================================================================
    # STEP 3.5: Detect Available Prometheus Port
    # ========================================================================

    - name: Check for manually set PROMETHEUS_PORT environment variable
      ansible.builtin.set_fact:
        prometheus_port_env: "{{ lookup('env', 'PROMETHEUS_PORT') }}"

    - name: Use manually set port if available
      ansible.builtin.set_fact:
        prometheus_port: "{{ prometheus_port_env }}"
        port_detection_skipped: true
      when: prometheus_port_env != ""

    - name: Display manually configured port
      ansible.builtin.debug:
        msg:
          - "✓ Using PROMETHEUS_PORT from environment: {{ prometheus_port_env }}"
      when: prometheus_port_env != ""

    - name: Check if preferred Prometheus port is in use
      ansible.builtin.shell: |
        ss -tuln | grep -E ':{{ prometheus_port_preferred }}\s' || netstat -tuln 2>/dev/null | grep -E ':{{ prometheus_port_preferred }}\s' || echo "available"
      register: preferred_port_check
      changed_when: false
      failed_when: false
      when: prometheus_port_env == ""

    - name: Check if fallback Prometheus port is in use
      ansible.builtin.shell: |
        ss -tuln | grep -E ':{{ prometheus_port_fallback }}\s' || netstat -tuln 2>/dev/null | grep -E ':{{ prometheus_port_fallback }}\s' || echo "available"
      register: fallback_port_check
      changed_when: false
      failed_when: false
      when: prometheus_port_env == "" and preferred_port_check.stdout is defined and "available" not in preferred_port_check.stdout

    - name: Set Prometheus port to preferred
      ansible.builtin.set_fact:
        prometheus_port: "{{ prometheus_port_preferred }}"
      when: prometheus_port_env == "" and preferred_port_check.stdout is defined and "available" in preferred_port_check.stdout

    - name: Set Prometheus port to fallback
      ansible.builtin.set_fact:
        prometheus_port: "{{ prometheus_port_fallback }}"
      when: prometheus_port_env == "" and preferred_port_check.stdout is defined and "available" not in preferred_port_check.stdout and fallback_port_check.stdout is defined and "available" in fallback_port_check.stdout

    - name: Fail if no Prometheus port available
      ansible.builtin.fail:
        msg: |
          Neither port {{ prometheus_port_preferred }} nor {{ prometheus_port_fallback }} are available!

          Current port usage:
          - Port {{ prometheus_port_preferred }}: IN USE
            {{ preferred_port_check.stdout }}
          - Port {{ prometheus_port_fallback }}: IN USE
            {{ fallback_port_check.stdout }}

          Please free one of these ports or stop existing Prometheus services:
            sudo lsof -i :{{ prometheus_port_preferred }}
            sudo lsof -i :{{ prometheus_port_fallback }}
      when: prometheus_port_env == "" and preferred_port_check.stdout is defined and "available" not in preferred_port_check.stdout and fallback_port_check.stdout is defined and "available" not in fallback_port_check.stdout

    - name: Display selected Prometheus port
      ansible.builtin.debug:
        msg:
          - "{{ '✓ Using preferred Prometheus port: ' + prometheus_port_preferred|string if 'available' in preferred_port_check.stdout else '⚠ Port ' + prometheus_port_preferred|string + ' in use, using fallback port: ' + prometheus_port_fallback|string }}"
      when: prometheus_port_env == "" and preferred_port_check.stdout is defined

    - name: Display detected configuration
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Grafana Monitoring Stack - Configuration"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Container Runtime: {{ runtime_name }}"
          - "Compose Tool: {{ compose_cmd }}"
          - "Grafana Directory: {{ grafana_dir }}"
          - "Grafana URL: http://localhost:{{ grafana_port }}"
          - "Prometheus URL: http://localhost:{{ prometheus_port }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Check if Grafana port is available
      ansible.builtin.wait_for:
        port: "{{ grafana_port }}"
        state: stopped
        timeout: 1
      register: grafana_port_check
      failed_when: false

    - name: Warn if Grafana port is in use
      ansible.builtin.debug:
        msg:
          - "⚠️  WARNING: Port {{ grafana_port }} is already in use"
          - "This may indicate Grafana stack is already running"
          - "Run 'cd {{ grafana_dir }} && {{ compose_cmd }} ps' to check"
      when: grafana_port_check.failed

    # ========================================================================
    # STEP 4: Configure Prometheus Port in Datasource
    # ========================================================================

    - name: Update Prometheus datasource URL (Linux - host networking)
      ansible.builtin.replace:
        path: "{{ grafana_dir }}/provisioning/datasources/prometheus.yaml"
        regexp: "url: http://[^:]+:\\d+"
        replace: "url: http://localhost:{{ prometheus_port }}"
      register: datasource_update_linux
      when: is_linux

    - name: Update Prometheus datasource URL (macOS - bridge networking)
      ansible.builtin.replace:
        path: "{{ grafana_dir }}/provisioning/datasources/prometheus.yaml"
        regexp: "url: http://[^:]+:\\d+"
        replace: "url: http://vllm-prometheus:9090"
      when: is_macos
      register: datasource_update_macos

    - name: Bump datasource version to force reload
      ansible.builtin.replace:
        path: "{{ grafana_dir }}/provisioning/datasources/prometheus.yaml"
        regexp: "version: \\d+"
        replace: "version: {{ 99 | random(start=10) }}"
      when: datasource_update_linux.changed or datasource_update_macos.changed

    - name: Display datasource configuration
      ansible.builtin.debug:
        msg:
          - "OS: {{ 'macOS' if is_macos else 'Linux' }}"
          - "Prometheus datasource URL (Grafana internal): {{ 'http://vllm-prometheus:9090' if is_macos else 'http://localhost:' + prometheus_port|string }}"
          - "Prometheus external URL: http://localhost:{{ prometheus_port }}"
      when: datasource_update_linux.changed or is_macos

    # ========================================================================
    # STEP 6: Start Grafana Stack
    # ========================================================================

    - name: Start Grafana stack
      ansible.builtin.shell: |
        export PROMETHEUS_PORT={{ prometheus_port }}
        {{ compose_cmd }} -f {{ compose_file }} up -d
      args:
        chdir: "{{ grafana_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stdout or 'Creating' in compose_up.stdout or 'created' in compose_up.stdout"
      failed_when: false

    - name: Check actual container status
      ansible.builtin.shell: "{{ compose_cmd }} -f {{ compose_file }} ps"
      args:
        chdir: "{{ grafana_dir }}"
      register: container_status
      changed_when: false
      failed_when: false

    - name: Get container logs if failed
      ansible.builtin.shell: |
        {{ compose_cmd }} -f {{ compose_file }} logs --tail=50 prometheus 2>&1 || echo "No prometheus logs"
        echo "---"
        {{ compose_cmd }} -f {{ compose_file }} logs --tail=50 grafana 2>&1 || echo "No grafana logs"
      args:
        chdir: "{{ grafana_dir }}"
      register: container_logs
      changed_when: false
      failed_when: false
      when: "'Up' not in container_status.stdout and 'running' not in container_status.stdout"

    - name: Display compose output
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Container Start Output"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Command: {{ compose_cmd }} -f {{ compose_file }} up -d"
          - "Working Directory: {{ grafana_dir }}"
          - "PROMETHEUS_PORT: {{ prometheus_port }}"
          - ""
          - "Output:"
          - "{{ compose_up.stdout }}"
          - "{{ compose_up.stderr }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        verbosity: 0

    - name: Display container status
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Container Status"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "{{ container_status.stdout }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        verbosity: 0

    - name: Display container logs
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Container Logs (Last 50 lines)"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "{{ container_logs.stdout }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        verbosity: 0
      when: container_logs is defined and container_logs.stdout is defined

    # ========================================================================
    # STEP 7: Wait for Services to be Healthy
    # ========================================================================

    - name: Wait for Prometheus to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ prometheus_port }}/-/healthy"
        method: GET
        status_code: 200
      register: prometheus_health
      retries: "{{ health_check_timeout // health_check_interval }}"
      delay: "{{ health_check_interval }}"
      until: prometheus_health.status == 200
      failed_when: false

    - name: Display Prometheus status
      ansible.builtin.debug:
        msg: "{{ '✓ Prometheus is READY!' if prometheus_health.status == 200 else '✗ Prometheus health check FAILED' }}"
      when: prometheus_health.status is defined

    - name: Wait for Grafana to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ grafana_port }}/api/health"
        method: GET
        status_code: 200
      register: grafana_health
      retries: "{{ health_check_timeout // health_check_interval }}"
      delay: "{{ health_check_interval }}"
      until: grafana_health.status == 200
      failed_when: false

    - name: Display Grafana status
      ansible.builtin.debug:
        msg:
          - "{{ '✓ Grafana is READY!' if grafana_health.status == 200 else '✗ Grafana health check FAILED' }}"
          - "Database: {{ grafana_health.json.database | default('unknown') }}"
          - "Version: {{ grafana_health.json.version | default('unknown') }}"
      when: grafana_health.status is defined

    # ========================================================================
    # STEP 8: Display Container Status
    # ========================================================================

    - name: Get container status
      ansible.builtin.command:
        cmd: "{{ compose_cmd }} ps"
        chdir: "{{ grafana_dir }}"
      register: compose_ps
      changed_when: false

    - name: Display container status
      ansible.builtin.debug:
        msg: "{{ compose_ps.stdout_lines }}"

    # ========================================================================
    # STEP 9: Setup SSH Tunnel for Live vLLM Metrics (Optional)
    # ========================================================================

    - name: Check if DUT_HOSTNAME is set
      ansible.builtin.set_fact:
        dut_hostname: "{{ lookup('env', 'DUT_HOSTNAME') }}"
        ansible_ssh_key: "{{ lookup('env', 'ANSIBLE_SSH_KEY') }}"
        ansible_ssh_user: "{{ lookup('env', 'ANSIBLE_SSH_USER') | default('ec2-user', true) }}"

    - name: Display SSH tunnel configuration
      ansible.builtin.debug:
        msg:
          - "SSH Tunnel Configuration:"
          - "  DUT_HOSTNAME: {{ dut_hostname if dut_hostname else 'Not set' }}"
          - "  ANSIBLE_SSH_KEY: {{ ansible_ssh_key if ansible_ssh_key else 'Not set' }}"
          - "  ANSIBLE_SSH_USER: {{ ansible_ssh_user }}"
          - ""
          - "{{ 'Will create SSH tunnel to forward vLLM metrics' if (dut_hostname and ansible_ssh_key) else 'SSH tunnel will NOT be created (environment variables not set)' }}"

    - name: Setup SSH tunnel for live vLLM metrics
      block:
        - name: Check if tunnel already exists
          ansible.builtin.shell: |
            ps aux | grep "ssh.*8000:localhost:8000" | grep -v grep || true
          register: existing_tunnel
          changed_when: false

        - name: Create SSH tunnel to vLLM server
          ansible.builtin.shell: |
            ssh -L 8000:localhost:8000 {{ ansible_ssh_user }}@{{ dut_hostname }} -N -f -i {{ ansible_ssh_key }} \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=3 \
              -o ExitOnForwardFailure=yes \
              -o StrictHostKeyChecking=no
          when: existing_tunnel.stdout == ""
          register: tunnel_created

        - name: Wait for tunnel to be established
          ansible.builtin.pause:
            seconds: 3
          when: tunnel_created.changed

        - name: Verify tunnel is active
          ansible.builtin.shell: |
            ps aux | grep "ssh.*8000:localhost:8000" | grep -v grep
          register: tunnel_status
          changed_when: false
          failed_when: false

        - name: Test vLLM metrics endpoint
          ansible.builtin.uri:
            url: "http://localhost:8000/metrics"
            method: GET
            status_code: 200
          register: vllm_metrics_test
          failed_when: false

        - name: Display SSH tunnel status
          ansible.builtin.debug:
            msg:
              - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              - "{{ '✓ SSH Tunnel for Live vLLM Metrics: ACTIVE' if tunnel_status.rc == 0 else '✗ SSH Tunnel: FAILED' }}"
              - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              - "Target: {{ dut_hostname }}"
              - "Local Port: 8000 → Remote Port: 8000"
              - "{{ '✓ vLLM /metrics endpoint: ACCESSIBLE' if vllm_metrics_test.status == 200 else '⚠ vLLM /metrics endpoint: NOT ACCESSIBLE (is vLLM running?)' }}"
              - ""
              - "Prometheus will scrape: http://localhost:8000/metrics"
              - "Check targets: http://localhost:{{ prometheus_port }}/targets"
              - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      when:
        - dut_hostname != ""
        - ansible_ssh_key != ""
      rescue:
        - name: Display tunnel setup failure
          ansible.builtin.debug:
            msg:
              - "⚠️  Warning: Failed to setup SSH tunnel for live vLLM metrics"
              - "Grafana will not be able to show real-time server metrics"
              - ""
              - "To setup manually:"
              - "  ssh -L 8000:localhost:8000 ec2-user@$DUT_HOSTNAME -N -f -i $ANSIBLE_SSH_KEY"
              - ""
              - "See: automation/test-execution/grafana/README.md"

    - name: Display SSH tunnel skip message
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "⚠️  SSH Tunnel for Live vLLM Metrics: SKIPPED"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "Environment variables not set:"
          - "  DUT_HOSTNAME: {{ dut_hostname | default('NOT SET') }}"
          - "  ANSIBLE_SSH_KEY: {{ ansible_ssh_key | default('NOT SET') }}"
          - ""
          - "Real-time vLLM metrics will NOT be available in Grafana."
          - "For post-test analysis, use the Streamlit Dashboard."
          - ""
          - "To enable live metrics:"
          - "  1. Set environment variables:"
          - "     export DUT_HOSTNAME=your-vllm-server-hostname"
          - "     export ANSIBLE_SSH_KEY=/path/to/your/ssh/key.pem"
          - ""
          - "  2. Re-run this playbook OR setup manually:"
          - "     ssh -L 8000:localhost:8000 ec2-user@$DUT_HOSTNAME -N -f -i $ANSIBLE_SSH_KEY"
          - ""
          - "See: automation/test-execution/grafana/README.md"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      when:
        - dut_hostname == "" or ansible_ssh_key == ""

    # ========================================================================
    # STEP 10: Display Access Information
    # ========================================================================

    - name: Display success message and access information
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✓ Grafana Monitoring Stack Started Successfully!"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "Grafana Dashboard:"
          - "  URL: http://localhost:{{ grafana_port }}"
          - "  Username: admin"
          - "  Password: admin (you'll be prompted to change on first login)"
          - ""
          - "Prometheus:"
          - "  URL: http://localhost:{{ prometheus_port }}"
          - "  Targets: http://localhost:{{ prometheus_port }}/targets"
          - "  Query: http://localhost:{{ prometheus_port }}/graph"
          - ""
          - "Next Steps:"
          - "  1. Ensure SSH tunnel is active (if not already set up)"
          - "  2. Open Grafana: http://localhost:{{ grafana_port }}"
          - "  3. Run benchmarks - live vLLM metrics will appear automatically"
          - "  4. For post-test analysis, use Streamlit Dashboard"
          - ""
          - "Useful Commands:"
          - "  View logs:    cd {{ grafana_dir }} && {{ compose_cmd }} logs -f"
          - "  Stop stack:   cd {{ grafana_dir }} && {{ compose_cmd }} down"
          - "  Restart:      cd {{ grafana_dir }} && {{ compose_cmd }} restart"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      when:
        - prometheus_health.status == 200
        - grafana_health.status == 200

    - name: Display troubleshooting information
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "⚠️  Warning: One or more services failed health checks"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "Troubleshooting:"
          - "  1. Check logs: cd {{ grafana_dir }} && {{ compose_cmd }} logs"
          - "  2. Check status: cd {{ grafana_dir }} && {{ compose_cmd }} ps"
          - "  3. Restart services: cd {{ grafana_dir }} && {{ compose_cmd }} restart"
          - "  4. Full reset: cd {{ grafana_dir }} && {{ compose_cmd }} down -v && {{ compose_cmd }} up -d"
          - ""
          - "Common Issues:"
          - "  - Ports in use: Stop other services using ports {{ grafana_port }} or {{ prometheus_port }}"
          - "  - Permission errors: Ensure {{ runtime_name }} has permissions"
          - "  - Container failed to start: Check {{ compose_cmd }} logs <service>"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      when:
        - prometheus_health.status != 200 or grafana_health.status != 200

    - name: Fail if services are not healthy
      ansible.builtin.fail:
        msg: "Grafana monitoring stack did not start successfully. See troubleshooting information above."
      when:
        - prometheus_health.status != 200 or grafana_health.status != 200
