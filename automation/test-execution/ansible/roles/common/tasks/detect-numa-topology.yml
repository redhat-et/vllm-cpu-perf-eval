---
# Detect NUMA Topology on DUT
# Auto-discovers NUMA nodes and allocates cores for vLLM/guidellm
# Uses custom Jinja2 filters instead of awk/shell scripts for better maintainability

- name: Get lscpu output
  ansible.builtin.command:
    cmd: lscpu -e=CPU,NODE,CORE -n
  register: lscpu_output
  changed_when: false
  failed_when: false

- name: Parse lscpu output (fallback for older lscpu)
  ansible.builtin.command:
    cmd: lscpu -e=CPU,NODE,CORE
  register: lscpu_output_with_header
  when: lscpu_output.rc != 0
  changed_when: false

- name: Set lscpu data
  ansible.builtin.set_fact:
    lscpu_data: "{{ lscpu_output.stdout if lscpu_output.rc == 0 else lscpu_output_with_header.stdout_lines[1:] | join('\n') }}"

- name: Extract NUMA nodes using custom filter
  ansible.builtin.set_fact:
    numa_nodes: "{{ lscpu_data | extract_numa_nodes }}"

- name: Count NUMA nodes
  ansible.builtin.set_fact:
    numa_node_count: "{{ numa_nodes | length }}"

- name: Display detected NUMA topology
  ansible.builtin.debug:
    msg:
      - "Detected NUMA Topology:"
      - "  NUMA nodes: {{ numa_nodes }}"
      - "  Node count: {{ numa_node_count }}"

- name: Validate minimum NUMA nodes
  ansible.builtin.assert:
    that:
      - numa_node_count | int >= 1
    fail_msg: "Failed to detect NUMA topology"
    success_msg: "✓ NUMA topology detected"

# Build generic NUMA node inventory (no fixed role names)
- name: Build generic NUMA node inventory
  ansible.builtin.set_fact:
    numa_nodes_inventory: "{{ numa_nodes_inventory | default([]) + [node_info] }}"
  vars:
    physical_cpus_list: "{{ lscpu_data | extract_primary_cpus(item) }}"
    all_cpus_list: "{{ lscpu_data | extract_all_cpus(item) }}"
    node_info:
      id: "{{ item | int }}"
      physical_cores: "{{ (physical_cpus_list.split(',') | length) | int if physical_cpus_list else 0 }}"
      physical_cpus: "{{ physical_cpus_list | cpu_list_to_range }}"
      physical_cpus_list: "{{ physical_cpus_list }}"
      all_cpus: "{{ all_cpus_list | cpu_list_to_range }}"
      all_cpus_list: "{{ all_cpus_list }}"
  loop: "{{ numa_nodes }}"
  loop_control:
    loop_var: item

# Determine housekeeping strategy based on node count
- name: Determine housekeeping strategy
  ansible.builtin.set_fact:
    housekeeping_strategy: "{{ 'reserve_node' if numa_node_count | int >= 3 else 'minimal_reservation' }}"

# Set allocation policy
- name: Set allocation policy
  ansible.builtin.set_fact:
    allocation_policy:
      housekeeping:
        strategy: "{{ housekeeping_strategy }}"
        reserved_node: 0  # Always reserve node 0 when possible
      workload:
        prefer_same_numa: true
        allow_multi_numa: true
        use_physical_cores_only: true

# Build new NUMA topology structure
- name: Set NUMA topology facts
  ansible.builtin.set_fact:
    numa_topology:
      node_count: "{{ numa_node_count }}"
      total_physical_cores: "{{ numa_nodes_inventory | map(attribute='physical_cores') | sum }}"
      nodes: "{{ numa_nodes_inventory }}"
      allocation_policy: "{{ allocation_policy }}"

# Add backward compatibility fields for existing playbooks
- name: Calculate node IDs for backward compatibility
  ansible.builtin.set_fact:
    housekeeping_node_id: "{{ allocation_policy.housekeeping.reserved_node if (allocation_policy.housekeeping.reserved_node is defined and allocation_policy.housekeeping.reserved_node != '') else (numa_nodes_inventory | first).id }}"
    guidellm_node_id: "{{ numa_nodes_inventory[1].id if numa_node_count | int >= 2 else (numa_nodes_inventory | first).id }}"
    vllm_node_id: "{{ (numa_nodes_inventory | last).id if numa_node_count | int >= 2 else (numa_nodes_inventory | first).id }}"

- name: Find nodes by ID for backward compatibility
  ansible.builtin.set_fact:
    housekeeping_node_info: "{{ numa_nodes_inventory | selectattr('id', 'equalto', housekeeping_node_id) | first }}"
    guidellm_node_info: "{{ numa_nodes_inventory | selectattr('id', 'equalto', guidellm_node_id) | first }}"
    vllm_node_info: "{{ numa_nodes_inventory | selectattr('id', 'equalto', vllm_node_id) | first }}"

- name: Add backward compatibility fields
  ansible.builtin.set_fact:
    numa_topology: "{{ numa_topology | combine(compat_fields, recursive=true) }}"
  vars:
    compat_fields:
      housekeeping:
        node: "{{ housekeeping_node_id | int }}"
        cpus: "{{ housekeeping_node_info.all_cpus }}"
      guidellm:
        node: "{{ guidellm_node_id | int }}"
        cpus: "{{ guidellm_node_info.physical_cpus }}"
      vllm:
        node: "{{ vllm_node_id | int }}"
        cpus: "{{ vllm_node_info.physical_cpus }}"
        cpus_list: "{{ vllm_node_info.physical_cpus_list }}"

- name: Display complete NUMA topology
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "NUMA Topology Detection Complete"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "Detected {{ numa_node_count }} NUMA nodes with {{ numa_topology.total_physical_cores }} total physical cores"
      - "Housekeeping strategy: {{ allocation_policy.housekeeping.strategy }}"
      - "Node 0: {{ numa_nodes_inventory[0].physical_cores }} physical cores (CPUs {{ numa_nodes_inventory[0].physical_cpus }})"
      - "{{ 'Node 1: ' + (numa_nodes_inventory[1].physical_cores | string) + ' physical cores (CPUs ' + numa_nodes_inventory[1].physical_cpus + ')' if numa_node_count | int >= 2 else '' }}"
      - "{{ 'Node 2: ' + (numa_nodes_inventory[2].physical_cores | string) + ' physical cores (CPUs ' + numa_nodes_inventory[2].physical_cpus + ')' if numa_node_count | int >= 3 else '' }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
