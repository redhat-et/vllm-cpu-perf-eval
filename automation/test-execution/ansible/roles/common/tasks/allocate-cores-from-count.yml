---
# Multi-NUMA Core Allocation with Auto-TP Calculation
# Takes simple input like "cores: 64" and auto-generates cpuset/NUMA/TP configuration
# Intelligently allocates cores across NUMA nodes when needed
# Auto-calculates optimal tensor parallelism (TP) based on NUMA distribution

# This task requires numa_topology to be set (from detect-numa-topology.yml)

- name: Validate required inputs
  ansible.builtin.assert:
    that:
      - requested_cores is defined
      - requested_cores | int > 0
      - numa_topology is defined
      - numa_topology.nodes is defined
    fail_msg: "Missing required variables: requested_cores and numa_topology must be set"

- name: Validate requested_tensor_parallel if provided
  ansible.builtin.assert:
    that:
      - requested_tensor_parallel | int in [1, 2, 4, 8]
    fail_msg: "Invalid tensor_parallel: {{ requested_tensor_parallel }}. Valid values: 1, 2, 4, 8"
  when:
    - requested_tensor_parallel is defined
    - requested_tensor_parallel != omit
    - requested_tensor_parallel != None
    - requested_tensor_parallel != ""

- name: Set tensor parallel value for filter (when provided)
  ansible.builtin.set_fact:
    _tp_value: "{{ requested_tensor_parallel }}"
  when:
    - requested_tensor_parallel is defined
    - requested_tensor_parallel != omit
    - requested_tensor_parallel != None
    - requested_tensor_parallel != ""

- name: Allocate cores using multi-NUMA algorithm (with TP)
  ansible.builtin.set_fact:
    core_allocation_result: "{{ numa_topology | allocate_cores_multi_numa(requested_cores | int, _tp_value) }}"
  when:
    - _tp_value is defined

- name: Allocate cores using multi-NUMA algorithm (auto TP)
  ansible.builtin.set_fact:
    core_allocation_result: "{{ numa_topology | allocate_cores_multi_numa(requested_cores | int, None) }}"
  when:
    - _tp_value is not defined

- name: Build auto-allocated core configuration
  ansible.builtin.set_fact:
    auto_core_config:
      name: "{{ requested_cores }}cores-numa{{ core_allocation_result.allocated_nodes | join('-') }}-tp{{ core_allocation_result.tensor_parallel }}"
      cores: "{{ requested_cores }}"
      cpuset_cpus: "{{ core_allocation_result.cpuset_cpus }}"
      cpuset_mems: "{{ core_allocation_result.cpuset_mems }}"
      tensor_parallel: "{{ core_allocation_result.tensor_parallel }}"
      omp_num_threads: "{{ core_allocation_result.omp_num_threads }}"
      allocated_nodes: "{{ core_allocation_result.allocated_nodes }}"
      cores_per_node: "{{ core_allocation_result.cores_per_node }}"
      allocation_strategy: "{{ core_allocation_result.allocation_strategy }}"

- name: Add OMP binding if multi-NUMA
  ansible.builtin.set_fact:
    auto_core_config: "{{ auto_core_config | combine({'omp_threads_bind': core_allocation_result.omp_threads_bind}) }}"
  when: core_allocation_result.omp_threads_bind is not none

- name: Display allocation summary
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "Multi-NUMA Core Allocation Complete"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "Requested: {{ requested_cores }} cores"
      - "Strategy: {{ core_allocation_result.allocation_strategy }}"
      - "NUMA Nodes: {{ core_allocation_result.allocated_nodes | join(', ') }}"
      - "Cores per Node: {{ core_allocation_result.cores_per_node | join(', ') }}"
      - "Tensor Parallel: {{ core_allocation_result.tensor_parallel }}{{ ' (auto-calculated)' if requested_tensor_parallel is not defined else ' (user-specified)' }}"
      - "CPU Pinning: {{ core_allocation_result.cpuset_cpus }}"
      - "Memory Affinity: {{ core_allocation_result.cpuset_mems }}"
      - "OMP Threads: {{ core_allocation_result.omp_num_threads }}"
      - "OMP Binding: {{ core_allocation_result.omp_threads_bind | default('auto') }}"
      - "Config Name: {{ auto_core_config.name }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
