---
# Collect vLLM Server Logs from DUT
# Enhanced version with flexible destination and journald tag support

- name: Ensure log directory exists on remote
  ansible.builtin.file:
    path: "{{ log_dir }}"
    state: directory
    mode: "0755"
  become: true

- name: Ensure destination directory exists on controller
  ansible.builtin.file:
    path: "{{ log_collection_dest }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  run_once: true
  connection: local
  vars:
    ansible_become: false

# Container logs collection (fallback if journald not available)
- name: Check if vLLM container exists
  ansible.builtin.shell:
    cmd: "podman ps -a --filter name={{ vllm_container_name | default('vllm-server') }} --format '{{'{{'}}.Names{{'}}'}}'"
  register: container_check
  changed_when: false
  failed_when: false
  when:
    - collect_container_logs | default(true)
    - container_runtime.engine == 'podman'

- name: Get vLLM container logs (if running)
  ansible.builtin.command:
    cmd: "podman logs {{ vllm_container_name | default('vllm-server') }}"
  register: container_logs
  changed_when: false
  failed_when: false
  when:
    - collect_container_logs | default(true)
    - container_runtime.engine == 'podman'
    - container_check.stdout | default('') | length > 0

# Journald logs collection (primary method)
- name: Get journald logs for vLLM
  ansible.builtin.command:
    cmd: "journalctl -t {{ journald_identifier }} --since '{{ journald_time_range }}' --no-pager"
  register: journald_logs
  changed_when: false
  become: true
  failed_when: false
  when: collect_journald_logs | default(true)

- name: Save vLLM logs to temporary file on DUT
  ansible.builtin.copy:
    content: "{{ journald_logs.stdout if journald_logs.stdout | default('') | length > 0 else container_logs.stdout | default('') }}"
    dest: "{{ log_dir }}/{{ log_filename_prefix }}.log"
  become: true
  when: >
    (journald_logs is defined and journald_logs.stdout is defined and journald_logs.stdout | length > 0) or
    (container_logs is defined and container_logs.stdout is defined and container_logs.stdout | length > 0)

- name: Log warning if no vLLM logs found
  ansible.builtin.debug:
    msg: "⚠️  No vLLM logs found in journald (tag: {{ journald_identifier }}) or container ({{ vllm_container_name | default('vllm-server') }})"
  when:
    - journald_logs.stdout is defined
    - journald_logs.stdout | length == 0
    - container_logs.stdout is defined
    - container_logs.stdout | length == 0

# System metrics collection
- name: Collect system metrics snapshot
  ansible.builtin.shell: |
    echo "=== CPU Info ===" > {{ log_dir }}/system-metrics.log
    lscpu >> {{ log_dir }}/system-metrics.log
    echo "" >> {{ log_dir }}/system-metrics.log
    echo "=== Memory Usage ===" >> {{ log_dir }}/system-metrics.log
    free -h >> {{ log_dir }}/system-metrics.log
    echo "" >> {{ log_dir }}/system-metrics.log
    echo "=== Container Stats ===" >> {{ log_dir }}/system-metrics.log
    podman stats --no-stream {{ vllm_container_name | default('vllm-server') }} >> {{ log_dir }}/system-metrics.log 2>&1 || true
  args:
    executable: /bin/bash
  changed_when: false
  become: true
  when: collect_system_metrics | default(true)

# Fetch logs to controller at specified destination
- name: Fetch vLLM logs to controller
  ansible.builtin.fetch:
    src: "{{ log_dir }}/{{ log_filename_prefix }}.log"
    dest: "{{ log_collection_dest }}/{{ log_filename_prefix }}.log"
    flat: true
  when: >
    (journald_logs is defined and journald_logs.stdout is defined and journald_logs.stdout | length > 0) or
    (container_logs is defined and container_logs.stdout is defined and container_logs.stdout | length > 0)

- name: Fetch system metrics to controller
  ansible.builtin.fetch:
    src: "{{ log_dir }}/system-metrics.log"
    dest: "{{ log_collection_dest }}/system-metrics.log"
    flat: true
  when: collect_system_metrics | default(true)

- name: Display log collection status
  ansible.builtin.debug:
    msg:
      - "✓ Logs collected from {{ inventory_hostname }}"
      - "Destination: {{ log_collection_dest }}"
      - "vLLM logs: {{ 'saved' if (journald_logs.stdout | default('') | length > 0 or container_logs.stdout | default('') | length > 0) else 'not found' }}"
      - "System metrics: {{ 'saved' if collect_system_metrics else 'skipped' }}"
