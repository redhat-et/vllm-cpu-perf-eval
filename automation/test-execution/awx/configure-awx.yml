---
# ============================================================================
# Automated AWX Configuration for vLLM Performance Testing
# ============================================================================
# This playbook configures AWX with projects, inventories, credentials, and
# job templates using environment variables as the single source of truth.
#
# QUICK START:
#
# 1. Set your environment variables:
#    export CONTROLLER_HOST=http://localhost:30080
#    export CONTROLLER_USERNAME=admin
#    export CONTROLLER_PASSWORD=password
#
#    # Infrastructure (REQUIRED - update these!)
#    export DUT_HOSTNAME=octo-et-2.lab.eng.rdu2.redhat.com
#    export LOADGEN_HOSTNAME=nfvsdn-14.oot.lab.eng.rdu2.redhat.com
#    export ANSIBLE_SSH_USER=root
#    export ANSIBLE_SSH_KEY=~/.ssh/id_rsa
#    export HF_TOKEN=$(cat ~/hf_token)
#
#    # Container images (optional - defaults provided)
#    export VLLM_IMAGE=public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.15.0
#    export GUIDELLM_IMAGE=ghcr.io/vllm-project/guidellm:v0.5.3
#
#    # Test defaults (optional - can override in job launch)
#    export TEST_MODEL=meta-llama/Llama-3.2-1B-Instruct
#    export BASE_WORKLOAD=chat
#    export REQUESTED_CORES=16
#
# 2. Run the configuration:
#    ansible-playbook automation/test-execution/awx/configure-awx.yml
#
# 3. Re-run anytime to update configuration with new environment values!
#
# ============================================================================

- name: Configure AWX for vLLM Performance Testing
  hosts: localhost
  gather_facts: false
  vars:
    # ========================================================================
    # AWX Connection Settings
    # ========================================================================
    # SECURITY NOTE: Use HTTPS in production. Set CONTROLLER_INSECURE=true for local testing only.
    controller_insecure: "{{ lookup('env', 'CONTROLLER_INSECURE') | default('false', true) | bool }}"
    controller_host: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://localhost:30080', true) if not controller_insecure else lookup('env', 'CONTROLLER_HOST') | default('http://localhost:30080', true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default('password', true) }}"
    validate_certs: "{{ false if controller_insecure else true }}"

    # ========================================================================
    # Project Settings
    # ========================================================================
    project_name: "vLLM CPU Perf Eval"
    project_scm_url: "{{ lookup('env', 'AWX_PROJECT_URL') | default('https://github.com/redhat-et/vllm-cpu-perf-eval.git', true) }}"
    project_scm_branch: "{{ lookup('env', 'AWX_PROJECT_BRANCH') | default('main', true) }}"

    # ========================================================================
    # Infrastructure Settings (from environment variables)
    # ========================================================================
    inventory_name: "vLLM Test Infrastructure"
    dut_hostname: "{{ lookup('env', 'DUT_HOSTNAME') | default('192.168.1.10', true) }}"
    dut_username: "{{ lookup('env', 'ANSIBLE_SSH_USER') | default('ec2-user', true) }}"
    loadgen_hostname: "{{ lookup('env', 'LOADGEN_HOSTNAME') | default('192.168.1.20', true) }}"
    loadgen_username: "{{ lookup('env', 'ANSIBLE_SSH_USER') | default('ec2-user', true) }}"
    ssh_key_path: "{{ lookup('env', 'ANSIBLE_SSH_KEY') | default('~/.ssh/id_rsa', true) }}"

    # ========================================================================
    # Container Image Settings (from environment variables)
    # ========================================================================
    vllm_image: "{{ lookup('env', 'VLLM_IMAGE') | default('public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.15.0', true) }}"
    guidellm_image: "{{ lookup('env', 'GUIDELLM_IMAGE') | default('ghcr.io/vllm-project/guidellm:v0.5.3', true) }}"

    # ========================================================================
    # Test Parameter Defaults (from environment variables)
    # ========================================================================
    default_test_model: "{{ lookup('env', 'TEST_MODEL') | default('meta-llama/Llama-3.2-1B-Instruct', true) }}"
    default_base_workload: "{{ lookup('env', 'BASE_WORKLOAD') | default('chat', true) }}"
    default_requested_cores: "{{ lookup('env', 'REQUESTED_CORES') | default('16', true) }}"
    default_guidellm_max_seconds: "{{ lookup('env', 'GUIDELLM_MAX_SECONDS') | default('300', true) }}"
    default_guidellm_rate: "{{ lookup('env', 'GUIDELLM_RATE') | default('[1]', true) }}"
    default_guidellm_wait_timeout: "{{ lookup('env', 'GUIDELLM_WAIT_TIMEOUT_SECONDS') | default('2400', true) }}"

  tasks:
    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "AWX Configuration Summary"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "AWX Controller: {{ controller_host }}"
          - "Project: {{ project_name }} ({{ project_scm_branch }})"
          - ""
          - "Infrastructure:"
          - "  DUT: {{ dut_hostname }} (user: {{ dut_username }})"
          - "  Load Generator: {{ loadgen_hostname }} (user: {{ loadgen_username }})"
          - "  SSH Key: {{ ssh_key_path }}"
          - ""
          - "Container Images:"
          - "  vLLM: {{ vllm_image }}"
          - "  GuideLLM: {{ guidellm_image }}"
          - ""
          - "Default Test Parameters:"
          - "  Model: {{ default_test_model }}"
          - "  Workload: {{ default_base_workload }}"
          - "  Cores: {{ default_requested_cores }}"
          - "  Max Duration: {{ default_guidellm_max_seconds }}s"
          - "  Rate: {{ default_guidellm_rate }}"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Wait for AWX API to be fully ready
      ansible.builtin.uri:
        url: "{{ controller_host }}/api/v2/ping/"
        method: GET
        validate_certs: "{{ validate_certs }}"
        status_code: 200
      register: awx_ping
      until: awx_ping.status == 200
      retries: 30
      delay: 2
      changed_when: false

    - name: Wait for AWX projects API to be accessible
      ansible.builtin.uri:
        url: "{{ controller_host }}/api/v2/projects/"
        method: GET
        validate_certs: "{{ validate_certs }}"
        status_code: 200
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        force_basic_auth: true
      register: awx_projects_check
      until: awx_projects_check.status == 200 and awx_projects_check.json is defined
      retries: 30
      delay: 5
      changed_when: false

    - name: Create vLLM Performance Testing Project
      awx.awx.project:
        name: "{{ project_name }}"
        organization: "Default"
        scm_type: git
        scm_url: "{{ project_scm_url }}"
        scm_branch: "{{ project_scm_branch }}"
        scm_update_on_launch: true
        scm_update_cache_timeout: 0
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Sync project to fetch latest code
      awx.awx.project_update:
        name: "{{ project_name }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        wait: true

    # NOTE: Removed management of Default organization to preserve shared settings
    # If you need to manage organization-specific settings, create a dedicated organization

    - name: Create vLLM Test Infrastructure Inventory
      awx.awx.inventory:
        name: "{{ inventory_name }}"
        organization: "Default"
        variables:
          # SSH configuration
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

          # HuggingFace credentials
          huggingface:
            token_source: "env"
            token_env_var: "HF_TOKEN"

          # Container runtime settings
          container_runtime:
            engine: "podman"
            image: "{{ vllm_image }}"  # vLLM server image
            guidellm_image: "{{ guidellm_image }}"  # GuideLLM benchmark image
            security_opts:
              - "seccomp=unconfined"
            capabilities:
              - "SYS_NICE"
            network_mode: "host"
            shm_size: "4g"

          # vLLM server configuration
          vllm_container_name: "vllm-server"
          vllm_server:
            host: "0.0.0.0"
            port: 8000

          # vLLM endpoint mode
          vllm_endpoint:
            mode: "managed"
            external:
              url: null
              api_key:
                enabled: false
                source: "env"
                env_var: "VLLM_API_KEY"

          # Health check configuration
          health_check:
            timeout: 300
            interval: 5

          # Platform setup options
          platform_setup:
            numa_balancing_off: true
            thp_defrag_never: true
            preempt_full: false

          # Core configurations
          core_configs:
            - name: "8cores-single-socket"
              cores: 8
              cpuset_cpus: "0-7"
              cpuset_mems: "0"
              tensor_parallel: 1
            - name: "16cores-single-socket"
              cores: 16
              cpuset_cpus: "0-15"
              cpuset_mems: "0"
              tensor_parallel: 1
            - name: "32cores-single-socket"
              cores: 32
              cpuset_cpus: "0-31"
              cpuset_mems: "0"
              tensor_parallel: 1
            - name: "64cores-single-socket-tp2"
              cores: 64
              cpuset_cpus: "0-63"
              cpuset_mems: "0"
              omp_num_threads: 32
              omp_threads_bind: "0-31|32-63"
              tensor_parallel: 2
            - name: "96cores-dual-socket-tp3"
              cores: 96
              cpuset_cpus: "0-95"
              cpuset_mems: "0,1"
              tensor_parallel: 3
            - name: "128cores-dual-socket-tp4"
              cores: 128
              cpuset_cpus: "0-127"
              cpuset_mems: "0,1"
              tensor_parallel: 4

          # Benchmark tool configurations
          # Note: Container images are pulled from container_runtime section above
          # CPU pinning is intentionally omitted to allow dynamic allocation
          benchmark_tool:
            guidellm:
              use_container: true
              profile: "concurrent"
              rate: [1, 2, 4, 8, 16, 32]
              max_seconds: 600
              max_requests: 1000
              request_timeout: 600
              warmup: 0.1
              max_concurrency: 128
              saturation_threshold: 0.98
              cooldown: 30
              outputs: "json,csv"
              exclude_throughput_target: false
              exclude_throughput_result: false
            vllm_bench:
              use_container: true
              num_prompts: 250

          # Test workload configurations
          test_configs:
            embedding:
              workload_type: "embedding"
              isl: 512
              osl: 1
              backend: "openai-embeddings"
              vllm_args:
                - "--dtype=bfloat16"
                - "--max-model-len=512"
              kv_cache_space: "1GiB"
            summarization:
              workload_type: "summarization"
              isl: 1024
              osl: 256
              backend: "openai-completions"
              vllm_args:
                - "--dtype=bfloat16"
                - "--no_enable_prefix_caching"
              kv_cache_space: "40GiB"
            chat:
              workload_type: "chat"
              isl: 512
              osl: 128
              backend: "openai-chat"
              vllm_args:
                - "--dtype=bfloat16"
                - "--no_enable_prefix_caching"
              kv_cache_space: "40GiB"
            code:
              workload_type: "code"
              isl: 2048
              osl: 512
              backend: "openai-completions"
              vllm_args:
                - "--dtype=bfloat16"
                - "--no_enable_prefix_caching"
              kv_cache_space: "60GiB"
            rag:
              workload_type: "rag"
              isl: 4096
              osl: 256
              backend: "openai-completions"
              vllm_args:
                - "--dtype=bfloat16"
                - "--no_enable_prefix_caching"
              kv_cache_space: "80GiB"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Create 'dut' inventory group
      awx.awx.group:
        name: dut
        inventory: "{{ inventory_name }}"
        variables:
          use_persistent_cache: false
          model_cache_dir: /var/lib/vllm-models
          log_dir: /tmp/vllm-logs
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Create 'load_generator' inventory group
      awx.awx.group:
        name: load_generator
        inventory: "{{ inventory_name }}"
        variables:
          log_dir: /tmp/vllm-logs
          bench_config:
            # Use hostvars to dynamically reference DUT host's ansible_host
            vllm_host: "{{ '{{' }} hostvars['dut-host']['ansible_host'] {{ '}}' }}"
            vllm_port: 8000
            results_dir: "/tmp/benchmark-results"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Add DUT host to inventory
      awx.awx.host:
        name: dut-host
        inventory: "{{ inventory_name }}"
        variables:
          ansible_host: "{{ dut_hostname }}"
          ansible_user: "{{ dut_username }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Add DUT host to 'dut' group
      awx.awx.group:
        name: dut
        inventory: "{{ inventory_name }}"
        hosts:
          - dut-host
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Add Load Generator host to inventory
      awx.awx.host:
        name: loadgen-host
        inventory: "{{ inventory_name }}"
        variables:
          ansible_host: "{{ loadgen_hostname }}"
          ansible_connection: ssh
          ansible_user: "{{ loadgen_username }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Add Load Generator host to 'load_generator' group
      awx.awx.group:
        name: load_generator
        inventory: "{{ inventory_name }}"
        hosts:
          - loadgen-host
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Check if SSH key file exists
      ansible.builtin.stat:
        path: "{{ ssh_key_path | expanduser }}"
      register: ssh_key_file

    - name: Read SSH private key
      ansible.builtin.slurp:
        src: "{{ ssh_key_path | expanduser }}"
      register: ssh_key_content
      when: ssh_key_file.stat.exists

    - name: Create DUT SSH Credential
      awx.awx.credential:
        name: "DUT SSH Key"
        organization: "Default"
        credential_type: "Machine"
        inputs:
          username: "{{ dut_username }}"
          ssh_key_data: "{{ ssh_key_content['content'] | b64decode }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present
      when: ssh_key_file.stat.exists

    - name: Warn if SSH key not found
      ansible.builtin.debug:
        msg: "WARNING: SSH key not found at {{ ssh_key_path }}. You'll need to add credentials manually."
      when: not ssh_key_file.stat.exists

    - name: Create HuggingFace Token Credential Type
      awx.awx.credential_type:
        name: "HuggingFace Token"
        kind: cloud
        inputs:
          fields:
            - id: hf_token
              type: string
              label: "HuggingFace API Token"
              secret: true
          required:
            - hf_token
        injectors:
          env:
            HF_TOKEN: "{{ '{{ hf_token }}' }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Remove old/legacy job templates
      awx.awx.job_template:
        name: "{{ item }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: absent
      loop:
        - "LLM GuideLLM Performance Test"
        - "Embedding Model Performance Test"
        - "Llm Benchmark"
        - "Llm Benchmark Concurrent Load"
      ignore_errors: true

    - name: Find all playbooks to auto-import
      ansible.builtin.find:
        paths:
          - "{{ playbook_dir }}/../ansible"
        patterns: "*.yml"
        file_type: file
        recurse: false
      register: found_playbooks
      delegate_to: localhost

    - name: Display found playbooks
      ansible.builtin.debug:
        msg: "Found {{ found_playbooks.files | length }} playbooks to import"

    - name: Create custom execution environment
      awx.awx.execution_environment:
        name: "vLLM AWX EE"
        image: "vllm-awx-ee:latest"
        pull: missing
        organization: "Default"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present

    - name: Create concurrency job templates with clean naming
      awx.awx.job_template:
        name: "{{ job_name_map[item.path | basename] }}"
        description: "{{ item.path | basename }}"
        job_type: "run"
        organization: "Default"
        inventory: "{{ inventory_name }}"
        project: "{{ project_name }}"
        playbook: "automation/test-execution/ansible/{{ item.path | basename }}"
        execution_environment: "vLLM AWX EE"
        credentials: "{{ ['DUT SSH Key'] if ssh_key_file.stat.exists else [] }}"
        verbosity: 1
        ask_credential_on_launch: true
        ask_variables_on_launch: true
        extra_vars: "{{ extra_vars_templates[item.path | basename] | default({}) }}"
        controller_host: "{{ controller_host }}"
        controller_username: "{{ controller_username }}"
        controller_password: "{{ controller_password }}"
        validate_certs: "{{ validate_certs }}"
        state: present
      loop: "{{ found_playbooks.files }}"
      vars:
        job_name_map:
          llm-benchmark-concurrent-load.yml: "LLM Concurrent Load Test"
          llm-benchmark.yml: "LLM Single Benchmark"
        extra_vars_templates:
          llm-benchmark-concurrent-load.yml:
            # ============================================================================
            # LLM Concurrent Load Test - 3-Phase Benchmark Suite
            # ============================================================================
            # DEFAULT CONFIGURATION - Populated from environment variables
            # You can override these values when launching the job

            test_model: "{{ default_test_model }}"
            base_workload: "{{ default_base_workload }}"
            requested_cores: "{{ default_requested_cores | int }}"

            # Phase control - By default, run Phase 1 only (change to false to enable)
            skip_phase_2: true   # Phase 2: Realistic (Variable Tokens, No Caching)
            skip_phase_3: true   # Phase 3: Production (Variable Tokens, With Caching)

            # GuideLLM test parameters
            guidellm_container_image: "{{ guidellm_image }}"
            guidellm_max_seconds: "{{ default_guidellm_max_seconds | int }}"
            guidellm_rate: "{{ default_guidellm_rate }}"
            guidellm_wait_timeout_seconds: "{{ default_guidellm_wait_timeout | int }}"

            # ============================================================================
            # ADVANCED OPTIONS - Uncomment to use

            # Test multiple core counts (replaces requested_cores):
            # core_sweep_counts: [16, 32, 64]

            # Run all 3 phases (comment out skip flags above or set to false):
            # skip_phase_1: false  # Phase 1: Baseline (Fixed Tokens, No Caching)
            # skip_phase_2: false  # Phase 2: Realistic (Variable Tokens, No Caching)
            # skip_phase_3: false  # Phase 3: Production (Variable Tokens, With Caching)

            # ============================================================================
            # Workload options: chat, rag, code, summarization, short_codegen
            # Model examples (gated models require HuggingFace token credential):
            #   - meta-llama/Llama-3.2-1B-Instruct
            #   - meta-llama/Llama-3.2-3B-Instruct
            #   - TinyLlama/TinyLlama-1.1B-Chat-v1.0 (no token required)

          llm-benchmark.yml:
            # ============================================================================
            # LLM Single Benchmark Test
            # ============================================================================
            # REQUIRED: Fill in these values when launching the job
            # Valid options:
            #   test_model: e.g. TinyLlama/TinyLlama-1.1B-Chat-v1.0 or meta-llama/Llama-3.2-1B-Instruct
            #   workload_type: chat, rag, code, summarization
            #   core_config_name: 8cores-single-socket, 16cores-single-socket, 32cores-single-socket,
            #                     64cores-single-socket-tp2, 96cores-dual-socket-tp3, 128cores-dual-socket-tp4

            # NOTE: These are intentionally left empty. The playbook will validate and fail if not provided.
            test_model: ""
            workload_type: ""
            core_config_name: ""

      when:
        - item.path | basename != 'hosts.yml'
        - >
          'concurrent' in (item.path | basename | lower) or
          'concurrency' in (item.path | basename | lower) or
          'llm-benchmark.yml' == (item.path | basename)

    - name: Count imported playbooks
      ansible.builtin.set_fact:
        imported_playbooks: "{{ found_playbooks.files | selectattr('path', 'match', '.*concurrent.*') | list + found_playbooks.files | selectattr('path', 'match', '.*llm-benchmark\\.yml$') | list }}"

    - name: Configuration complete
      ansible.builtin.debug:
        msg:
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - "✓ AWX Configuration Complete!"
          - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          - ""
          - "Access AWX: {{ controller_host }}"
          - "Login: {{ controller_username }} / ********"
          - ""
          - "Configured Resources:"
          - "  ✓ Project: {{ project_name }} ({{ project_scm_branch }})"
          - "  ✓ Inventory: {{ inventory_name }}"
          - "    - DUT Host: {{ dut_hostname }}"
          - "    - Load Generator: {{ loadgen_hostname }}"
          - "  ✓ Credentials: DUT SSH Key"
          - "  ✓ Credential Type: HuggingFace Token"
          - "  ✓ Execution Environment: vLLM AWX EE"
          - "  ✓ Job Templates: LLM Concurrent Load Test, LLM Single Benchmark"
          - ""
          - "Container Images:"
          - "  - vLLM: {{ vllm_image }}"
          - "  - GuideLLM: {{ guidellm_image }}"
          - ""
          - "Default Test Parameters:"
          - "  - Model: {{ default_test_model }}"
          - "  - Workload: {{ default_base_workload }}"
