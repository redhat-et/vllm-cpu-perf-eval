apiVersion: 1

providers:
  - name: "vLLM Performance Dashboards"
    orgId: 1
    folder: "vLLM CPU Performance"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: false
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
