# Grafana Datasource Configuration - Prometheus
# Auto-provisions Prometheus datasource for vLLM live metrics
#
# IMPORTANT: If port 9090 is already in use on your system:
#   1. Manual docker-compose deployment:
#      - Update the URL below to match your PROMETHEUS_PORT (e.g., http://localhost:9091)
#      - Run: export PROMETHEUS_PORT=9091 && docker-compose up -d
#
#   2. Ansible playbook deployment (RECOMMENDED):
#      - Run: ansible-playbook start-grafana.yml
#      - The playbook automatically detects available ports and updates this file

apiVersion: 1

datasources:
  - name: Prometheus-vLLM
    type: prometheus
    access: proxy
    url: http://vllm-prometheus:9090
    isDefault: false
    uid: prometheus-vllm
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      queryTimeout: 60s
    version: 66
