version: "3.8"

# vLLM CPU Performance Evaluation - Monitoring Stack (Runs on Ansible Controller)
# Real-time monitoring of vLLM server metrics during benchmark execution
# Deploy on your local machine/laptop for live performance visualization

services:
  # Prometheus - Metrics scraping for vLLM server
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: vllm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - vllm-monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  # Grafana 10.4 - Visualization and dashboarding
  grafana:
    image: grafana/grafana:10.4.0
    container_name: vllm-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Security settings
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin  # CHANGE IN PRODUCTION!
      - GF_AUTH_ANONYMOUS_ENABLED=false

      # Server settings
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=false

      # Logging
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=info

      # Dashboards
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/vllm-monitoring-v2.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - vllm-monitoring
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  grafana-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  vllm-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
