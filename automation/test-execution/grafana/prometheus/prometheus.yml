# Prometheus Configuration - Ansible Controller Deployment
# Runs on your local machine/laptop, scrapes vLLM server metrics via SSH tunnel
#
# Architecture:
#   1. SSH Tunnel - Forwards vLLM server :8000 to localhost:8000
#   2. Prometheus - Scrapes vLLM /metrics endpoint and stores data locally
#   3. Grafana - Visualizes real-time metrics in dashboards
#
# Note: GuideLLM benchmark results are analyzed post-test via Streamlit Dashboard

global:
  scrape_interval: 15s      # How often to scrape targets
  evaluation_interval: 15s  # How often to evaluate rules

  # Attach these labels to all time series
  external_labels:
    monitor: "vllm-perf-eval"
    environment: "benchmark"

# Scrape configurations
scrape_configs:
  # vLLM Server Live Metrics
  # Requires SSH tunnel: ssh -L 8000:localhost:8000 ec2-user@$DUT_HOSTNAME
  - job_name: "vllm-live"
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: "/metrics"

    # When running on DUT with host networking, access vLLM directly
    # For remote SSH tunnel deployment, use localhost:8000
    static_configs:
      - targets: ["localhost:8000"]
        labels:
          instance: "dut"
          source: "vllm-live"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
