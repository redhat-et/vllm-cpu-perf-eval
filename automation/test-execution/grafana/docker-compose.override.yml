# macOS Override - host networking doesn't work on macOS (podman VM)
# This override removes host networking and adds port mappings
# Prometheus listens on internal port 9090, mapped externally to 9090
services:
  prometheus:
    network_mode: bridge
    ports:
      - "9090:9090"
    networks:
      - vllm-monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.listen-address=:9090"

  grafana:
    network_mode: bridge
    ports:
      - "3000:3000"
    networks:
      - vllm-monitoring
    depends_on:
      prometheus:
        condition: service_healthy

networks:
  vllm-monitoring:
    driver: bridge
